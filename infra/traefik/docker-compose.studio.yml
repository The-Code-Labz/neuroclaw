# ─────────────────────────────────────────────────────────────────────────────
# Example wiring for the Studio preview + Studio API services onto the shared
# Traefik network. This is a reference fragment, not a standalone stack — merge
# the `services:` entries into whichever compose file actually builds/runs
# `studio-preview` and `studio-api` (Jarvis/Angelina's side), and merge the
# `traefik:` volume mount into the existing Traefik service definition.
#
# Deliberate choice: `traefik.enable=true` docker-provider labels are NOT used
# here. Routing for both origins is defined explicitly in
# infra/traefik/dynamic/*.yml.template (file provider) instead, because:
#   1. One backend service handles every `*.preview.$STUDIO_DOMAIN` hostname —
#      there's no per-session container to auto-discover labels from.
#   2. A file-provider router is reviewable in a PR diff; docker labels buried
#      in a compose file are easy to drift from the security header story.
# If this service ever needs to scale to N replicas that's fine — the
# loadBalancer.servers entry in the dynamic config can point at a Docker
# Swarm/Compose service name (DNS round-robins across replicas) same as today.
# ─────────────────────────────────────────────────────────────────────────────

services:
  studio-preview:
    # image / build: <owned by the Studio preview service itself>
    container_name: studio-preview
    restart: unless-stopped
    networks:
      - nat
    environment:
      - PORT=3400
    # No `ports:` publish — only Traefik on the `nat` network can reach it.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3400/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=false"   # routed via file provider, see header comment

  studio-api:
    # image / build: <owned by the Studio API service itself>
    container_name: studio-api
    restart: unless-stopped
    networks:
      - nat
    environment:
      - PORT=3401
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3401/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=false"   # routed via file provider, see header comment

  traefik:
    # Existing Traefik service — only the addition below matters here.
    volumes:
      - ./infra/traefik/dynamic:/config/studio:ro   # rendered output, NOT the .template files
    # Static traefik.yml providers.file section must include this path, e.g.:
    #   providers:
    #     file:
    #       directory: /config
    #       watch: true

networks:
  nat:
    external: true
