<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#00b7ff"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="NeuroClaw"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icon.svg"/>
<title>NeuroClaw — AI Command OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=VT323&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-0: #000814;
    --bg-1: #020617;
    --bg-2: #050e1d;
    --panel: #07111f;
    --panel-2: #0a192f;
    --panel-3: #0e2237;
    --line: rgba(0, 183, 255, 0.18);
    --line-soft: rgba(0, 183, 255, 0.08);
    --line-hard: rgba(0, 183, 255, 0.42);

    --neon: #00b7ff;
    --neon-2: #00f5d4;
    --violet: #8b5cf6;
    --amber: #facc15;
    --danger: #fb3b5f;
    --boundary: #e0a949;      /* warm amber — capacity/boundary states, not errors */
    --green: #22d39a;

    --text: #e0f2fe;
    --text-soft: #a5cfe8;
    --muted: #64748b;
    --muted-2: #475569;

    --glow-neon: 0 0 0 1px rgba(0,183,255,0.35), 0 0 18px rgba(0,183,255,0.18);
    --glow-soft: 0 0 0 1px rgba(0,183,255,0.18), 0 0 24px rgba(0,183,255,0.08);

    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --display: 'Space Grotesk', system-ui, sans-serif;
    --pixel: 'VT323', 'JetBrains Mono', monospace;

    /* Chat page height — desktop default; overridden per breakpoint below */
    --chat-h: calc(100vh - 56px - 32px - 32px);
    --chat-min-h: 580px;
  }

  * { box-sizing: border-box; }
  html, body { 
    margin: 0; 
    padding: 0; 
    background: var(--bg-1); 
    color: var(--text); 
    font-family: var(--display);
    width: 100%;
    max-width: 100%;
    overflow-x: hidden;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  html { 
    height: 100%; 
    height: -webkit-fill-available; 
  }
  body {
    min-height: 100vh;
    min-height: 100dvh;
    min-height: -webkit-fill-available;
    background:
      radial-gradient(1100px 600px at 18% -10%, rgba(0,183,255,0.10), transparent 60%),
      radial-gradient(900px 500px at 100% 0%, rgba(139,92,246,0.06), transparent 60%),
      radial-gradient(700px 400px at 50% 110%, rgba(0,245,212,0.05), transparent 60%),
      var(--bg-1);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    /* Background extends to edges so notch area shows the dark theme */
    background-color: var(--bg-1);
  }
  
  /* Disable body effects on mobile for performance */
  @media (max-width: 640px) {
    body::before, body::after {
      display: none;
    }
  }
  
  /* Root container */
  #root {
    min-height: 100vh;
    min-height: 100dvh;
    min-height: -webkit-fill-available;
    width: 100%;
    max-width: 100%;
  }
  
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background-image:
      linear-gradient(rgba(0,183,255,0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,183,255,0.045) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse at 30% 20%, black 30%, transparent 80%);
  }
  body::after {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 2;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,183,255,0.014) 0px,
      rgba(0,183,255,0.014) 1px,
      transparent 1px,
      transparent 3px
    );
    mix-blend-mode: screen;
  }

  /* Selection */
  ::selection { background: rgba(0,183,255,0.35); color: #fff; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,183,255,0.18); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0,183,255,0.32); }

  /* shared */
  .nc-panel {
    background: linear-gradient(180deg, rgba(10,25,47,0.78), rgba(7,17,31,0.82));
    border: 1px solid var(--line);
    border-radius: 4px;
    position: relative;
    backdrop-filter: blur(8px);
  }
  .nc-panel.glow { box-shadow: var(--glow-soft); }
  .nc-panel.glow:hover { box-shadow: var(--glow-neon); }
  .nc-panel::before, .nc-panel::after,
  .nc-corners::before, .nc-corners::after {
    content: '';
    position: absolute;
    width: 8px; height: 8px;
    border-color: var(--neon);
    pointer-events: none;
  }
  .nc-corners > .nc-c {
    position: absolute; width: 8px; height: 8px; border: 0 solid var(--neon);
  }
  .nc-corners > .tl { top: -1px; left: -1px; border-top-width: 1.5px; border-left-width: 1.5px; }
  .nc-corners > .tr { top: -1px; right: -1px; border-top-width: 1.5px; border-right-width: 1.5px; }
  .nc-corners > .bl { bottom: -1px; left: -1px; border-bottom-width: 1.5px; border-left-width: 1.5px; }
  .nc-corners > .br { bottom: -1px; right: -1px; border-bottom-width: 1.5px; border-right-width: 1.5px; }

  /* Pixel corner accents on .nc-panel via pseudo: keep simple */
  .nc-panel::before {
    top: -1px; left: -1px;
    border-top: 1.5px solid var(--neon);
    border-left: 1.5px solid var(--neon);
  }
  .nc-panel::after {
    bottom: -1px; right: -1px;
    border-bottom: 1.5px solid var(--neon);
    border-right: 1.5px solid var(--neon);
  }

  /* Markdown rendering for agent chat bubbles (page-chat.jsx .nc-md). */
  .nc-md p { margin: 4px 0; white-space: pre-wrap; }
  .nc-md h1, .nc-md h2, .nc-md h3 { color: var(--neon-2); margin: 10px 0 4px; font-family: var(--mono); }
  .nc-md h1 { font-size: 15px; } .nc-md h2 { font-size: 14px; } .nc-md h3 { font-size: 13px; }
  .nc-md ul, .nc-md ol { padding-left: 18px; margin: 4px 0; }
  .nc-md li { margin: 2px 0; }
  .nc-md code { background: rgba(0,183,255,0.08); border: 1px solid rgba(0,183,255,0.2); border-radius: 3px; padding: 1px 5px; font-family: var(--mono); font-size: 11px; color: var(--neon); }
  .nc-md pre { background: rgba(0,0,0,0.5); border: 1px solid var(--line); border-radius: 4px; padding: 10px 12px; margin: 8px 0; overflow-x: auto; }
  .nc-md pre code { background: none; border: none; padding: 0; color: var(--text-soft); font-size: 12px; }
  .nc-md strong { color: var(--neon); font-weight: 600; }
  .nc-md em { font-style: italic; color: var(--text-soft); }
  .nc-md a { color: var(--neon); text-decoration: underline; word-break: break-all; }
  .nc-md blockquote { border-left: 2px solid var(--neon); padding-left: 10px; color: var(--text-soft); margin: 6px 0; font-style: italic; }
  .nc-md table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 12px; }
  .nc-md th, .nc-md td { border: 1px solid var(--line); padding: 6px 10px; text-align: left; }
  .nc-md th { background: rgba(0,183,255,0.08); color: var(--neon); }
  .nc-md img { max-width: 100%; max-height: 480px; border-radius: 6px; border: 1px solid var(--line); display: block; margin: 6px 0; }

  .mono { font-family: var(--mono); }
  .pixel { font-family: var(--pixel); letter-spacing: 0.08em; }
  .muted { color: var(--muted); }
  .softc { color: var(--text-soft); }
  .neonc { color: var(--neon); }
  .neon2 { color: var(--neon-2); }
  .violetc { color: var(--violet); }
  .amberc { color: var(--amber); }
  .dangerc { color: var(--danger); }
  .boundaryc { color: var(--boundary); }
  .greenc { color: var(--green); }

  .label-tiny {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
  }

  /* Status dot */
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
  .dot.green { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .dot.cyan  { background: var(--neon-2); box-shadow: 0 0 8px var(--neon-2); }
  .dot.blue  { background: var(--neon); box-shadow: 0 0 8px var(--neon); }
  .dot.amber { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
  .dot.red   { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
  .dot.boundary { background: var(--boundary); box-shadow: 0 0 8px var(--boundary); }
  .dot.violet{ background: var(--violet); box-shadow: 0 0 8px var(--violet); }
  .dot.muted { background: #334155; box-shadow: none; }

  .pulse { animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.45; transform: scale(0.85); }
  }

  .blink { animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .scan-line {
    position: absolute; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon), transparent);
    opacity: 0.35;
    animation: scan 6s linear infinite;
  }
  @keyframes scan {
    0% { top: 0%; }
    100% { top: 100%; }
  }

  /* Buttons */
  .nc-btn {
    background: rgba(0,183,255,0.06);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 7px 12px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .15s ease;
    border-radius: 2px;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .nc-btn:hover { background: rgba(0,183,255,0.12); border-color: var(--line-hard); box-shadow: var(--glow-soft); color: #fff; }
  .nc-btn.primary { background: rgba(0,183,255,0.12); border-color: rgba(0,183,255,0.6); color: #d6f4ff; }
  .nc-btn.primary:hover { background: rgba(0,183,255,0.22); box-shadow: 0 0 0 1px var(--neon), 0 0 18px rgba(0,183,255,0.4); }
  .nc-btn.ghost { background: transparent; }
  .nc-btn.danger { border-color: rgba(251,59,95,0.5); color: var(--danger); }

  /* Holographic outline */
  .holo {
    position: relative;
  }
  .holo::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: inherit;
    pointer-events: none;
    background:
      linear-gradient(135deg, transparent 40%, rgba(0,183,255,0.12) 50%, transparent 60%);
    mix-blend-mode: screen;
    opacity: .5;
  }

  /* Divider */
  .nc-hr { height: 1px; background: linear-gradient(90deg, transparent, var(--line-hard), transparent); border: 0; }

  /* Tag */
  .tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 8px;
    border: 1px solid var(--line);
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-soft);
    background: rgba(0,183,255,0.05);
  }
  .tag.cyan { color: var(--neon-2); border-color: rgba(0,245,212,0.35); background: rgba(0,245,212,0.05); }
  .tag.blue { color: var(--neon); border-color: rgba(0,183,255,0.45); background: rgba(0,183,255,0.06); }
  .tag.violet { color: var(--violet); border-color: rgba(139,92,246,0.45); background: rgba(139,92,246,0.08); }
  .tag.amber { color: var(--amber); border-color: rgba(250,204,21,0.45); background: rgba(250,204,21,0.06); }
  .tag.red { color: var(--danger); border-color: rgba(251,59,95,0.45); background: rgba(251,59,95,0.06); }
  .tag.boundary { color: var(--boundary); border-color: rgba(224,169,73,0.45); background: rgba(224,169,73,0.08); }
  .tag.green { color: var(--green); border-color: rgba(34,211,154,0.45); background: rgba(34,211,154,0.06); }
  .tag.muted { color: var(--muted); border-color: rgba(100,116,139,0.35); background: rgba(100,116,139,0.06); }

  /* Inputs */
  .nc-input, .nc-select, .nc-textarea {
    width: 100%;
    background: rgba(2,6,23,0.7);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 9px 12px;
    font-family: var(--mono);
    font-size: 12px;
    border-radius: 2px;
    outline: none;
  }
  .nc-input:focus, .nc-select:focus, .nc-textarea:focus { border-color: var(--neon); box-shadow: 0 0 0 1px rgba(0,183,255,0.3); }

  /* Sidebar */
  .nc-sidebar a {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px;
    margin: 1px 8px;
    color: var(--text-soft);
    text-decoration: none;
    font-family: var(--mono);
    font-size: 12px;
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    border-left: 2px solid transparent;
    transition: all .15s ease;
  }
  .nc-sidebar a:hover { background: rgba(0,183,255,0.06); color: #fff; }
  .nc-sidebar a.active {
    background: linear-gradient(90deg, rgba(0,183,255,0.18), rgba(0,183,255,0.02));
    border-left-color: var(--neon);
    color: #fff;
    box-shadow: inset 0 0 30px rgba(0,183,255,0.06);
  }
  .nc-sidebar a.active::after {
    content: ''; position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--neon); box-shadow: 0 0 8px var(--neon);
  }
  .nc-sidebar a.disabled { opacity: 0.45; cursor: not-allowed; }

  /* Util grid bg */
  .grid-bg {
    background-image:
      linear-gradient(rgba(0,183,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,183,255,0.06) 1px, transparent 1px);
    background-size: 24px 24px;
  }

  /* Card hover tilt feel */
  .tilt { transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease; }
  .tilt:hover { transform: translateY(-2px); border-color: var(--line-hard); }

  /* Bar */
  .bar-track { background: rgba(0,183,255,0.08); height: 4px; border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, var(--neon), var(--neon-2)); box-shadow: 0 0 8px var(--neon); }

  /* Hide scrollbar */
  .no-scrollbar::-webkit-scrollbar { display: none; }

  /* Animated cursor */
  .cursor::after { content: '_'; color: var(--neon); animation: blink 1s steps(2) infinite; margin-left: 2px; }

  /* App layout */
  .app {
    display: grid;
    grid-template-columns: 240px 1fr;
    grid-template-rows: 56px 1fr 32px;
    height: 100vh;
    height: 100dvh; /* Dynamic viewport height for mobile */
    width: 100vw;
    position: relative;
    z-index: 3;
  }
  .app.collapsed { grid-template-columns: 64px 1fr; }
  .app .topbar { grid-column: 1 / 3; grid-row: 1; }
  .app .sidebar { grid-column: 1; grid-row: 2 / 4; }
  .app .main    { grid-column: 2; grid-row: 2; overflow: auto; -webkit-overflow-scrolling: touch; }
  .app .footer  { grid-column: 2; grid-row: 3; }

  /* Large tablet / small desktop: auto-collapse sidebar */
  @media (max-width: 1024px) {
    .app { grid-template-columns: 64px 1fr; }
    .app.collapsed { grid-template-columns: 64px 1fr; }
  }
  
  /* Small tablet: even narrower collapsed sidebar */
  @media (max-width: 768px) {
    .app { grid-template-columns: 56px 1fr; }
    .app.collapsed { grid-template-columns: 56px 1fr; }
  }

  /* Mobile menu button */
  #mobile-menu-btn {
    display: none;
    position: fixed;
    top: calc(6px + env(safe-area-inset-top, 0px));
    left: calc(6px + env(safe-area-inset-left, 0px));
    z-index: 400;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 4px;
    width: 34px;
    height: 34px;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text);
    font-size: 16px;
    line-height: 1;
    -webkit-tap-highlight-color: transparent;
  }
  #mobile-menu-btn:active {
    background: var(--panel-2);
  }

  /* Mobile overlay */
  #sidebar-mob-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 299;
    opacity: 0;
    transition: opacity 0.25s ease;
    -webkit-tap-highlight-color: transparent;
  }
  #sidebar-mob-overlay.open {
    display: block;
    opacity: 1;
  }

  /* Mobile: sidebar becomes a slide-over overlay */
  @media (max-width: 640px) {
    #mobile-menu-btn { display: flex; }
    
    .app {
      grid-template-columns: 1fr !important;
      grid-template-rows: calc(48px + env(safe-area-inset-top, 0px)) 1fr 0 !important;
      width: 100vw !important;
      max-width: 100vw !important;
      /* NOTE: do NOT put padding on the grid container — safe-area padding is on the
         individual grid areas (.topbar, .main) to avoid double-insetting. */
    }
    .app.collapsed {
      grid-template-columns: 1fr !important;
    }
    .app .topbar  { 
      grid-column: 1 !important; 
      padding-left: calc(44px + env(safe-area-inset-left, 0px)) !important;
      padding-right: calc(8px + env(safe-area-inset-right, 0px)) !important;
      padding-top: env(safe-area-inset-top, 0px) !important;
      height: calc(48px + env(safe-area-inset-top, 0px)) !important;
      width: 100%;
    }
    .app .sidebar {
      position: fixed;
      top: 0; 
      left: 0; 
      bottom: 0;
      width: calc(240px + env(safe-area-inset-left, 0px));
      max-width: 75vw;
      z-index: 300;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      grid-column: unset !important;
      grid-row: unset !important;
      background: linear-gradient(180deg, rgba(7,17,31,0.98), rgba(2,6,23,0.98));
      box-shadow: 4px 0 20px rgba(0,0,0,0.5);
      padding-top: env(safe-area-inset-top, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .app .sidebar.mob-open { 
      transform: translateX(0); 
    }
    .app .main { 
      grid-column: 1 !important; 
      padding: 8px;
      width: 100% !important;
      max-width: 100% !important;
      box-sizing: border-box;
    }
    .app .main > * {
      max-width: 100%;
      box-sizing: border-box;
    }
    .app .footer { 
      display: none !important;
    }
  }

  /* Chart bars */
  .chart-bar {
    background: linear-gradient(180deg, var(--neon), rgba(0,183,255,0.2));
    box-shadow: 0 0 12px rgba(0,183,255,0.3);
    width: 100%;
    border-radius: 1px 1px 0 0;
  }

  /* Glowing orb */
  .orb {
    width: 220px; height: 220px; border-radius: 50%;
    background:
      radial-gradient(circle at 35% 30%, rgba(255,255,255,0.55), transparent 30%),
      radial-gradient(circle at 50% 50%, rgba(0,183,255,0.55), rgba(0,183,255,0) 70%),
      radial-gradient(circle at 50% 50%, rgba(0,245,212,0.4), rgba(0,245,212,0) 60%);
    box-shadow: 0 0 80px rgba(0,183,255,0.4), inset 0 0 60px rgba(0,183,255,0.2);
    position: relative;
    animation: orb-spin 18s linear infinite;
  }
  .orb::before, .orb::after {
    content: ''; position: absolute; inset: -8px;
    border: 1px dashed rgba(0,183,255,0.35); border-radius: 50%;
    animation: orb-rot 14s linear infinite;
  }
  .orb::after {
    inset: -22px;
    border-color: rgba(0,245,212,0.18);
    animation-duration: 28s;
    animation-direction: reverse;
  }
  @keyframes orb-spin {
    0% { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(20deg); }
  }
  @keyframes orb-rot {
    0% { transform: rotate(0); }
    100% { transform: rotate(360deg); }
  }

  /* Streaming dots */
  .stream-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--neon); margin-right: 3px; animation: streamb 1.4s ease-in-out infinite; }
  .stream-dot:nth-child(2) { animation-delay: 0.2s; }
  .stream-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes streamb { 0%,80%,100%{opacity:.2;transform:translateY(0)} 40%{opacity:1;transform:translateY(-2px)} }

  .tab-bar {
    display: flex; gap: 0; border-bottom: 1px solid var(--line);
  }
  .tab-bar > .tab {
    padding: 10px 16px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .15s ease;
  }
  .tab-bar > .tab:hover { color: var(--text); }
  .tab-bar > .tab.active { color: var(--neon); border-bottom-color: var(--neon); box-shadow: 0 1px 0 var(--neon); }

  /* Loading bars on cards */
  .skel-bar {
    height: 8px; background: linear-gradient(90deg, rgba(0,183,255,0.04), rgba(0,183,255,0.18), rgba(0,183,255,0.04));
    background-size: 200% 100%;
    animation: skel 2s linear infinite;
    border-radius: 2px;
  }
  @keyframes skel { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .stripe-bg {
    background-image: repeating-linear-gradient(45deg, rgba(0,183,255,0.04) 0 6px, transparent 6px 12px);
  }

  /* Modal */
  .modal-back {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(0,8,20,0.7);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
  }

  /* Tooltip-like chip */
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 8px;
    background: rgba(2,6,23,0.7);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-family: var(--mono); font-size: 10px;
    color: var(--text-soft);
    letter-spacing: 0.06em;
  }

  /* SVG icons base */
  .ico { width: 16px; height: 16px; flex: none; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }

  /* Docs prose */
  .nc-prose { color: var(--text); font-size: 14px; line-height: 1.6; max-width: 880px; }
  .nc-prose h1 { font-family: var(--display); font-size: 26px; margin: 0 0 16px; color: var(--text); border-bottom: 1px solid var(--line-soft); padding-bottom: 10px; }
  .nc-prose h2 { font-family: var(--display); font-size: 18px; margin: 24px 0 10px; color: var(--neon-2); }
  .nc-prose h3 { font-family: var(--display); font-size: 15px; margin: 20px 0 8px; color: var(--text-soft); }
  .nc-prose p  { margin: 0 0 12px; }
  .nc-prose ul, .nc-prose ol { margin: 0 0 12px 20px; padding: 0; }
  .nc-prose li { margin: 4px 0; }
  .nc-prose a  { color: var(--neon); text-decoration: underline; text-underline-offset: 2px; }
  .nc-prose code { background: rgba(0,183,255,0.10); padding: 1px 6px; border-radius: 4px; font-family: var(--mono); font-size: 12px; }
  .nc-prose pre { background: var(--panel-2); padding: 12px 14px; border-radius: 6px; border: 1px solid var(--line-soft); overflow-x: auto; }
  .nc-prose pre code { background: transparent; padding: 0; font-size: 12px; }
  .nc-prose blockquote { border-left: 3px solid var(--neon); padding: 6px 14px; color: var(--text-soft); background: rgba(0,183,255,0.05); margin: 0 0 12px; }
  .nc-prose table { border-collapse: collapse; margin: 0 0 12px; font-size: 13px; }
  .nc-prose th, .nc-prose td { padding: 6px 12px; border: 1px solid var(--line-soft); text-align: left; }
  .nc-prose th { background: var(--panel-2); color: var(--text); }

  /* ============================================================
     RESPONSIVE UTILITY CLASSES
     Mobile-first approach for PWA compatibility
     ============================================================ */

  /* Responsive grid utilities */
  .grid-responsive {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  }
  .grid-responsive-sm {
    display: grid;
    gap: 10px;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  }
  .grid-responsive-lg {
    display: grid;
    gap: 14px;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  }

  /* Stat cards - 4 columns on desktop, auto-fit on mobile */
  .stat-grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(4, 1fr);
    width: 100%;
  }
  @media (max-width: 1200px) {
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 640px) {
    .stat-grid { 
      grid-template-columns: 1fr !important; 
      width: 100% !important;
      gap: 8px !important;
    }
    .stat-grid > * {
      width: 100% !important;
    }
  }

  /* Flex utilities */
  .flex-wrap-mobile {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .flex-col-mobile {
    display: flex;
    gap: 12px;
  }
  @media (max-width: 768px) {
    .flex-col-mobile { flex-direction: column; }
  }

  /* Hide/show utilities */
  .hide-mobile { display: block; }
  .show-mobile { display: none; }
  .hide-tablet { display: block; }
  @media (max-width: 768px) {
    .hide-tablet { display: none !important; }
  }
  @media (max-width: 640px) {
    .hide-mobile { display: none !important; }
    .show-mobile { display: block !important; }
    .show-mobile-flex { display: flex !important; }
    .show-mobile-grid { display: grid !important; }
  }

  /* Full width on mobile */
  .full-mobile {
    width: auto;
  }
  @media (max-width: 640px) {
    .full-mobile { width: 100%; }
  }

  /* Stack layout - horizontal on desktop, vertical on mobile */
  .stack {
    display: flex;
    gap: 16px;
  }
  .stack-reverse { flex-direction: row-reverse; }
  @media (max-width: 768px) {
    .stack { flex-direction: column; }
    .stack-reverse { flex-direction: column-reverse; }
  }

  /* Horizontal scroll container for mobile */
  .scroll-x-mobile {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
  }
  @media (max-width: 768px) {
    .scroll-x-mobile {
      display: flex;
      flex-wrap: nowrap;
      gap: 12px;
      padding-bottom: 8px;
    }
    .scroll-x-mobile > * {
      flex: 0 0 auto;
      min-width: 280px;
    }
  }

  /* Kanban-specific mobile styles */
  .kanban-grid {
    display: grid;
    gap: 14px;
    grid-template-columns: repeat(4, 1fr);
  }
  @media (max-width: 1100px) {
    .kanban-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 640px) {
    .kanban-grid {
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x mandatory;
      gap: 12px;
      padding-bottom: 12px;
    }
    .kanban-grid > * {
      flex: 0 0 85vw;
      scroll-snap-align: start;
      max-width: 320px;
    }
  }

  /* Chat layout - 3 columns to stacked */
  .chat-layout {
    display: grid;
    grid-template-columns: 260px 1fr 280px;
    gap: 0;
    height: 100%;
  }
  @media (max-width: 1024px) {
    .chat-layout { grid-template-columns: 200px 1fr; }
    .chat-layout .chat-inspector { display: none; }
  }
  @media (max-width: 768px) {
    .chat-layout { grid-template-columns: 1fr; }
    .chat-layout .chat-sessions { display: none; }
    .chat-layout .chat-sessions.mob-open {
      display: block;
      position: fixed;
      top: 56px; left: 0; bottom: 32px;
      width: 260px;
      z-index: 100;
      background: var(--panel);
      border-right: 1px solid var(--line);
    }
  }
  @media (max-width: 640px) {
    .chat-layout .chat-sessions.mob-open {
      top: calc(48px + env(safe-area-inset-top, 0px));
      bottom: calc(52px + env(safe-area-inset-bottom, 0px));
    }
  }

  /* Overview 3-column layout */
  .overview-3col {
    display: grid;
    grid-template-columns: 1.1fr 1.5fr 1.1fr;
    gap: 16px;
    align-items: start;
    width: 100%;
  }
  @media (max-width: 1024px) {
    .overview-3col { grid-template-columns: 1fr 1fr; }
    .overview-3col > :nth-child(2) { grid-column: span 2; order: -1; }
  }
  @media (max-width: 768px) {
    .overview-3col { 
      grid-template-columns: 1fr; 
      gap: 10px;
    }
    .overview-3col > :nth-child(2) { grid-column: span 1; order: 0; }
  }
  @media (max-width: 640px) {
    .overview-3col { 
      grid-template-columns: 1fr !important; 
      gap: 8px !important;
      width: 100% !important;
    }
    .overview-3col > * {
      width: 100% !important;
      max-width: 100% !important;
    }
  }

  /* Center orb container */
  .orb-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 260px;
  }
  @media (max-width: 640px) {
    .orb-container { min-height: 200px; }
    .orb-container .orb {
      width: 160px;
      height: 160px;
    }
  }

  /* Touch-friendly button sizes */
  @media (max-width: 640px) {
    .nc-btn {
      padding: 10px 14px;
      font-size: 12px;
      min-height: 44px; /* iOS touch target */
    }
    .nc-input, .nc-select, .nc-textarea {
      padding: 12px 14px;
      font-size: 16px; /* Prevents iOS zoom */
      min-height: 44px;
    }
  }

  /* Page header responsive */
  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .page-header-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  @media (max-width: 640px) {
    .page-header {
      flex-direction: column;
      align-items: flex-start;
    }
    .page-header-actions {
      width: 100%;
    }
    .page-header-actions > * {
      flex: 1;
      min-width: 120px;
    }
  }

  /* TopBar responsive */
  .topbar-content {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 0 16px;
    height: 100%;
  }
  .topbar-chips {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    flex: 1;
    max-width: 600px;
  }
  @media (max-width: 900px) {
    .topbar-chips { max-width: 300px; }
  }
  @media (max-width: 640px) {
    .topbar-chips {
      display: none;
    }
    .topbar-search {
      flex: 1;
    }
  }

  /* Mobile bottom nav (optional enhancement) */
  .mobile-bottom-nav {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 52px;
    background: var(--panel);
    border-top: 1px solid var(--line);
    z-index: 200;
    padding: 0 4px;
  }
  .mobile-bottom-nav-inner {
    display: flex;
    justify-content: space-around;
    align-items: center;
    height: 100%;
  }
  .mobile-bottom-nav a {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    padding: 4px 8px;
    color: var(--muted);
    text-decoration: none;
    font-family: var(--mono);
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    -webkit-tap-highlight-color: transparent;
  }
  .mobile-bottom-nav a.active { color: var(--neon); }
  .mobile-bottom-nav a svg { width: 18px; height: 18px; }
  @media (max-width: 640px) {
    .mobile-bottom-nav { display: block; }
    .app .footer { display: none; }
    /* !important beats inline style={{ padding: N }} from JSX */
    .app .main { padding: 8px !important; padding-bottom: 52px !important; }
    /* Direct height override for chat — beats cached JSX inline style too */
    .chat-layout { height: calc(100dvh - 48px - 52px - 16px) !important; min-height: 0 !important; }
    :root {
      --chat-h: calc(100dvh - 48px - 52px - 16px);
      --chat-min-h: 0px;
    }
  }
  @media (max-width: 375px) {
    .mobile-bottom-nav {
      height: 48px;
    }
    .mobile-bottom-nav a {
      font-size: 7px;
      padding: 3px 6px;
    }
    .mobile-bottom-nav a svg { width: 16px; height: 16px; }
    .app .main { padding: 8px !important; padding-bottom: 48px !important; }
    .chat-layout { height: calc(100dvh - 48px - 48px - 16px) !important; }
    :root {
      --chat-h: calc(100dvh - 48px - 48px - 16px);
    }
  }

  /* Safe area insets for notched devices (iPhone X, 11, 12, 13, 14, 15 etc.) */
  @supports (padding: max(0px)) {
    /* Topbar: add padding AND increase height for safe area */
    .app .topbar { 
      padding-top: max(0px, env(safe-area-inset-top)); 
      /* Landscape: left/right insets when notch is on side */
      padding-left: max(16px, env(safe-area-inset-left));
      padding-right: max(16px, env(safe-area-inset-right));
    }
    
    /* Bottom nav: account for home indicator */
    .mobile-bottom-nav { 
      padding-bottom: max(0px, env(safe-area-inset-bottom)); 
      height: calc(52px + env(safe-area-inset-bottom));
      /* Landscape side insets */
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    
    /* Main content: landscape side insets */
    .app .main {
      padding-left: max(8px, env(safe-area-inset-left));
      padding-right: max(8px, env(safe-area-inset-right));
    }
    
    @media (max-width: 640px) {
      /* Grid rows must include safe area for topbar height */
      .app {
        grid-template-rows: calc(48px + env(safe-area-inset-top)) 1fr 0 !important;
      }
      
      /* Topbar height includes safe area */
      .app .topbar {
        height: calc(48px + env(safe-area-inset-top)) !important;
        padding-top: env(safe-area-inset-top);
        /* On mobile, account for menu button + safe area */
        padding-left: calc(44px + env(safe-area-inset-left)) !important;
      }
      
      /* Mobile menu button positioned below safe area */
      #mobile-menu-btn {
        top: calc(6px + env(safe-area-inset-top)) !important;
        left: calc(6px + env(safe-area-inset-left)) !important;
      }
      
      /* Sidebar needs top padding for notch when open */
      .app .sidebar {
        padding-top: env(safe-area-inset-top);
        padding-left: env(safe-area-inset-left);
      }
      
      /* Main content bottom padding for bottom nav */
      .app .main {
        padding-bottom: calc(52px + env(safe-area-inset-bottom)) !important;
      }
      .chat-layout {
        height: calc(100dvh - 48px - env(safe-area-inset-top, 0px) - 52px - env(safe-area-inset-bottom, 0px) - 16px) !important;
        min-height: 0 !important;
      }
      :root {
        --chat-h: calc(100dvh - 48px - env(safe-area-inset-top, 0px) - 52px - env(safe-area-inset-bottom, 0px) - 16px);
      }
    }

    @media (max-width: 375px) {
      /* Smaller topbar on tiny phones but still account for safe area */
      .app {
        grid-template-rows: calc(44px + env(safe-area-inset-top)) 1fr 0 !important;
      }

      .app .topbar {
        height: calc(44px + env(safe-area-inset-top)) !important;
      }

      .mobile-bottom-nav {
        height: calc(48px + env(safe-area-inset-bottom));
      }

      .app .main {
        padding-bottom: calc(48px + env(safe-area-inset-bottom)) !important;
      }
      .chat-layout {
        height: calc(100dvh - 44px - env(safe-area-inset-top, 0px) - 48px - env(safe-area-inset-bottom, 0px) - 16px) !important;
      }
      :root {
        --chat-h: calc(100dvh - 44px - env(safe-area-inset-top, 0px) - 48px - env(safe-area-inset-bottom, 0px) - 16px);
      }
    }
  }

  /* Table responsive - horizontal scroll */
  .table-responsive {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  @media (max-width: 768px) {
    .table-responsive table {
      min-width: 600px;
    }
  }

  /* Card grid for agents/sessions/etc */
  .card-grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  }
  @media (max-width: 640px) {
    .card-grid {
      grid-template-columns: 1fr;
    }
  }
  
  /* Stat card mobile scaling */
  .stat-card {
    padding: 14px;
  }
  .stat-value {
    font-size: 28px;
  }
  @media (max-width: 640px) {
    .stat-card {
      padding: 10px !important;
    }
    .stat-value {
      font-size: 20px !important;
      margin-top: 4px !important;
    }
  }
  @media (max-width: 375px) {
    .stat-card {
      padding: 8px !important;
    }
    .stat-value {
      font-size: 18px !important;
    }
  }

  /* Collapsible panel for mobile */
  .collapsible-panel {
    transition: max-height 0.3s ease, opacity 0.3s ease;
    overflow: hidden;
  }
  .collapsible-panel.collapsed {
    max-height: 0;
    opacity: 0;
  }

  /* Typography scaling for mobile */
  @media (max-width: 640px) {
    .nc-prose h1 { font-size: 22px; }
    .nc-prose h2 { font-size: 16px; }
    .nc-prose { font-size: 13px; }
  }

  /* ============================================================
     AGGRESSIVE MOBILE SCALING
     Scale down everything for small phone screens
     ============================================================ */
  
  @media (max-width: 640px) {
    /* Base font size reduction */
    html {
      font-size: 14px;
    }
    
    /* App layout with safe area for notch */
    .app {
      grid-template-rows: calc(48px + env(safe-area-inset-top, 0px)) 1fr 0 !important;
    }
    
    /* Panels and cards */
    .nc-panel {
      padding: 8px !important;
      border-radius: 3px;
    }
    .nc-panel.glow {
      box-shadow: none; /* Remove glow for performance */
    }
    
    /* Buttons - smaller but still tappable */
    .nc-btn {
      padding: 6px 10px !important;
      font-size: 10px !important;
      min-height: 36px !important;
      gap: 4px !important;
    }
    
    /* Inputs — 16px prevents iOS auto-zoom on focus */
    .nc-input, .nc-select, .nc-textarea {
      padding: 8px 10px !important;
      font-size: 16px !important;
      min-height: 38px !important;
    }
    
    /* Tags and chips */
    .tag, .chip {
      padding: 2px 5px !important;
      font-size: 8px !important;
      gap: 3px !important;
    }
    
    /* Status dots */
    .dot {
      width: 6px !important;
      height: 6px !important;
    }
    
    /* Labels */
    .label-tiny {
      font-size: 8px !important;
      letter-spacing: 0.12em !important;
    }
    
    /* Monospace text */
    .mono {
      font-size: 10px !important;
    }
    
    /* Page header */
    .page-header h1 {
      font-size: 18px !important;
      margin: 2px 0 4px !important;
    }
    .page-header {
      margin-bottom: 12px !important;
      gap: 8px !important;
    }
    .page-header-actions {
      gap: 4px !important;
    }
    
    /* Stat cards */
    .stat-grid {
      gap: 8px !important;
    }
    
    /* Main content area */
    .app .main {
      padding: 8px !important;
      padding-bottom: calc(60px + env(safe-area-inset-bottom, 0px)) !important;
      padding-left: max(8px, env(safe-area-inset-left, 0px)) !important;
      padding-right: max(8px, env(safe-area-inset-right, 0px)) !important;
      width: 100% !important;
      max-width: 100% !important;
    }
    
    /* TopBar - safe area aware */
    .app .topbar {
      height: calc(48px + env(safe-area-inset-top, 0px)) !important;
      padding-top: env(safe-area-inset-top, 0px) !important;
      padding-bottom: 0 !important;
      padding-left: calc(48px + env(safe-area-inset-left, 0px)) !important;
      padding-right: max(8px, env(safe-area-inset-right, 0px)) !important;
      width: 100% !important;
    }
    
    /* Mobile menu button - below the notch */
    #mobile-menu-btn {
      top: calc(6px + env(safe-area-inset-top, 0px)) !important;
      left: calc(6px + env(safe-area-inset-left, 0px)) !important;
    }
    
    /* Ensure full width on all child elements */
    .app .main > div {
      width: 100% !important;
      max-width: 100% !important;
    }
    
    /* Orb - scale down significantly */
    .orb {
      width: 120px !important;
      height: 120px !important;
    }
    .orb-container {
      min-height: 140px !important;
    }
    
    /* Overview grid */
    .overview-3col {
      gap: 8px !important;
    }
    
    /* Kanban */
    .kanban-grid > * {
      flex: 0 0 75vw !important;
      min-width: 260px !important;
    }
    
    /* Section titles inside panels */
    .nc-panel .label-tiny {
      margin-bottom: 6px !important;
    }
    
    /* StatCard content */
    [class*="StatCard"], .nc-panel.glow.tilt {
      padding: 10px !important;
    }
    [class*="StatCard"] > div > div:nth-child(2),
    .nc-panel.glow.tilt > div > div:nth-child(2) {
      font-size: 20px !important;
      margin-top: 4px !important;
    }
    
    /* Hide decorative elements */
    .scan-line,
    .stripe-bg {
      display: none !important;
    }
    
    /* Reduce gaps everywhere */
    [style*="gap: 12px"] { gap: 8px !important; }
    [style*="gap: 14px"] { gap: 8px !important; }
    [style*="gap: 16px"] { gap: 10px !important; }
    
    /* Reduce margins */
    [style*="marginBottom: 16"] { margin-bottom: 10px !important; }
    [style*="marginBottom: 14"] { margin-bottom: 8px !important; }
    [style*="margin-bottom: 16px"] { margin-bottom: 10px !important; }
    [style*="margin-bottom: 14px"] { margin-bottom: 8px !important; }
  }
  
  /* Extra small phones (iPhone SE, etc.) */
  @media (max-width: 375px) {
    html {
      font-size: 12px;
    }
    
    .nc-btn {
      padding: 5px 8px !important;
      font-size: 9px !important;
      min-height: 32px !important;
    }
    
    .page-header h1 {
      font-size: 16px !important;
    }
    
    .orb {
      width: 100px !important;
      height: 100px !important;
    }
    .orb-container {
      min-height: 120px !important;
    }
    
    .app .topbar {
      height: calc(44px + env(safe-area-inset-top, 0px)) !important;
    }
    .app {
      grid-template-rows: calc(44px + env(safe-area-inset-top, 0px)) 1fr 0 !important;
    }

    #mobile-menu-btn {
      width: 32px !important;
      height: 32px !important;
      top: calc(6px + env(safe-area-inset-top, 0px)) !important;
      left: calc(6px + env(safe-area-inset-left, 0px)) !important;
      font-size: 14px !important;
    }

    .mobile-bottom-nav {
      height: calc(48px + env(safe-area-inset-bottom, 0px)) !important;
    }
    .mobile-bottom-nav a {
      font-size: 8px !important;
      padding: 4px 8px !important;
