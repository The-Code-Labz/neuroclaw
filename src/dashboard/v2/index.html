<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#00b7ff"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<link rel="apple-touch-icon" href="/icon.svg"/>
<title>NeuroClaw — AI Command OS</title>
<!-- FOUC-free theme boot: apply the persisted theme BEFORE first paint.
     Classic (non-module) inline script — runs synchronously during HTML
     parsing, ahead of the deferred entry.jsx module script. The generated
     theme CSS (virtual:theme-tokens.css, from themes/registry.ts) already
     covers the no-JS / pre-hydration case via `:root:not([data-theme])`
     matching the default theme, so a failure here just means "default". -->
<script>
(function () {
  try {
    var t = localStorage.getItem('nc_dashboard_theme');
    if (t) document.documentElement.setAttribute('data-theme', t);
    // Layout axis (data-layout) — applied here, pre-paint, so a roomy layout
    // does not cause a visible shell reflow after React mounts. If unset, the
    // generated layout CSS ':root:not([data-layout])' default (compact) paints.
    var l = localStorage.getItem('nc_dashboard_layout');
    if (l) document.documentElement.setAttribute('data-layout', l);
    // Design axis (data-design) — shape/component personality (corner radius +
    // button typography). Applied pre-paint for the same reason as theme/layout
    // above. If unset, the generated design CSS ':root:not([data-design])'
    // default (terminal — today's exact look) paints.
    var d = localStorage.getItem('nc_dashboard_design');
    if (d) document.documentElement.setAttribute('data-design', d);
  } catch (e) { /* localStorage unavailable (private mode, etc.) — default theme + layout + design render */ }
})();
</script>
<!-- Production build entry — all JS served by Vite bundle, no Babel transpilation -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* Theme tokens (--bg-0, --accent, --text, etc.) are no longer defined here.
     They now live in themes/registry.ts and are delivered as generated CSS
     scoped to `:root[data-theme="<id>"]` (see virtual:theme-tokens.css,
     imported from entry.jsx). This block only holds theme-INDEPENDENT
     structural/shared CSS — the same rules that used to sit below the old
     unscoped `:root {}` block here. */

  * { box-sizing: border-box; }
  html, body { 
    margin: 0; 
    padding: 0; 
    background: var(--bg-1); 
    color: var(--text); 
    font-family: var(--display);
    width: 100%;
    max-width: 100%;
    overflow-x: hidden;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  html { 
    height: 100%; 
    height: -webkit-fill-available; 
  }
  body {
    min-height: 100vh;
    min-height: 100dvh;
    min-height: -webkit-fill-available;
    background:
      radial-gradient(1100px 600px at 18% -10%, color-mix(in srgb, var(--accent) 4%, transparent), transparent 60%),
      var(--bg-0);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    /* Background extends to edges so notch area shows the dark theme */
    background-color: var(--bg-0);
  }
  
  /* Disable body effects on mobile for performance */
  @media (max-width: 640px) {
    body::before, body::after {
      display: none;
    }
  }
  
  /* Root container */
  #root {
    min-height: 100vh;
    min-height: 100dvh;
    min-height: -webkit-fill-available;
    width: 100%;
    max-width: 100%;
  }
  
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background-image:
      linear-gradient(color-mix(in srgb, var(--accent) 4.5%, transparent) 1px, transparent 1px),
      linear-gradient(90deg, color-mix(in srgb, var(--accent) 4.5%, transparent) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse at 30% 20%, black 30%, transparent 80%);
  }
  body::after {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 2;
    background: repeating-linear-gradient(
      to bottom,
      color-mix(in srgb, var(--accent) 1.4%, transparent) 0px,
      color-mix(in srgb, var(--accent) 1.4%, transparent) 1px,
      transparent 1px,
      transparent 3px
    );
    mix-blend-mode: screen;
  }

  /* Selection */
  ::selection { background: color-mix(in srgb, var(--accent) 35%, transparent); color: var(--text); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: color-mix(in srgb, var(--accent) 18%, transparent); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: color-mix(in srgb, var(--accent) 32%, transparent); }

  /* shared */
  .nc-panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius-panel, 6px);
    position: relative;
  }
  .nc-panel.glow { box-shadow: var(--glow-soft); }
  .nc-panel.glow:hover { box-shadow: var(--glow-neon); }
  .nc-panel::before, .nc-panel::after,
  .nc-corners::before, .nc-corners::after {
    content: '';
    position: absolute;
    width: 8px; height: 8px;
    border-color: var(--accent);
    pointer-events: none;
  }
  .nc-corners > .nc-c {
    position: absolute; width: 8px; height: 8px; border: 0 solid var(--accent);
  }
  .nc-corners > .tl { top: -1px; left: -1px; border-top-width: 1.5px; border-left-width: 1.5px; }
  .nc-corners > .tr { top: -1px; right: -1px; border-top-width: 1.5px; border-right-width: 1.5px; }
  .nc-corners > .bl { bottom: -1px; left: -1px; border-bottom-width: 1.5px; border-left-width: 1.5px; }
  .nc-corners > .br { bottom: -1px; right: -1px; border-bottom-width: 1.5px; border-right-width: 1.5px; }

  /* Flat panels: automatic corner accents dropped (Hybrid restyle).
     Explicit .nc-corners markers still work where opted in. */
  .nc-panel::before, .nc-panel::after { display: none; }

  /* Markdown rendering for agent chat bubbles (page-chat.jsx .nc-md). */
  .nc-md p { margin: 4px 0; white-space: pre-wrap; }
  .nc-md h1, .nc-md h2, .nc-md h3 { color: var(--accent-2); margin: 10px 0 4px; font-family: var(--display); }
  .nc-md h1 { font-size: 15px; } .nc-md h2 { font-size: 14px; } .nc-md h3 { font-size: 13px; }
  .nc-md ul, .nc-md ol { padding-left: 18px; margin: 4px 0; }
  .nc-md li { margin: 2px 0; }
  .nc-md code { background: color-mix(in srgb, var(--accent) 8%, transparent); border: 1px solid color-mix(in srgb, var(--accent) 20%, transparent); border-radius: var(--radius-inline, 3px); padding: 1px 5px; font-family: var(--mono); font-size: 11px; color: var(--accent); }
  .nc-md pre { background: rgba(0,0,0,0.5); border: 1px solid var(--line); border-radius: var(--radius-panel, 6px); padding: 10px 12px; margin: 8px 0; overflow-x: auto; }
  .nc-md pre code { background: none; border: none; padding: 0; color: var(--text-soft); font-size: 12px; }
  .nc-md strong { color: var(--accent); font-weight: 600; }
  .nc-md em { font-style: italic; color: var(--text-soft); }
  .nc-md a { color: var(--accent); text-decoration: underline; word-break: break-all; }
  .nc-md blockquote { border-left: 2px solid var(--accent); padding-left: 10px; color: var(--text-soft); margin: 6px 0; font-style: italic; }
  .nc-md table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 12px; }
  .nc-md th, .nc-md td { border: 1px solid var(--line); padding: 6px 10px; text-align: left; }
  .nc-md th { background: color-mix(in srgb, var(--accent) 8%, transparent); color: var(--accent); }
  .nc-md img { max-width: 100%; max-height: 480px; border-radius: var(--radius-panel, 6px); border: 1px solid var(--line); display: block; margin: 6px 0; }

  .mono { font-family: var(--mono); }
  .pixel { font-family: var(--mono); letter-spacing: 0.08em; }
  .muted { color: var(--muted); }
  .softc { color: var(--text-soft); }
  .neonc { color: var(--accent); }
  .neon2 { color: var(--accent-2); }
  .violetc { color: var(--violet); }
  .amberc { color: var(--amber); }
  .dangerc { color: var(--danger); }
  .boundaryc { color: var(--boundary); }
  .greenc { color: var(--green); }

  .label-tiny {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
  }

  /* Status dot */
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
  .dot.green { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .dot.cyan  { background: var(--accent-2); box-shadow: 0 0 8px var(--accent-2); }
  .dot.blue  { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .dot.amber { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
  .dot.red   { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
  .dot.boundary { background: var(--boundary); box-shadow: 0 0 8px var(--boundary); }
  .dot.violet{ background: var(--violet); box-shadow: 0 0 8px var(--violet); }
  .dot.muted { background: #334155; box-shadow: none; }

  .pulse { animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.45; transform: scale(0.85); }
  }

  .blink { animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .scan-line {
    position: absolute; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.35;
    animation: scan 6s linear infinite;
  }
  @keyframes scan {
    0% { top: 0%; }
    100% { top: 100%; }
  }

  /* Buttons */
  .nc-btn {
    background: color-mix(in srgb, var(--accent) 6%, transparent);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 7px 12px;
    font-family: var(--btn-font, var(--mono));
    font-size: 11px;
    letter-spacing: var(--btn-tracking, 0.12em);
    text-transform: var(--btn-case, uppercase);
    cursor: pointer;
    transition: all .15s ease, border-radius .2s ease;
    border-radius: var(--radius-control, 2px);
    display: inline-flex; align-items: center; gap: 8px;
  }
  .nc-btn:hover { background: color-mix(in srgb, var(--accent) 12%, transparent); border-color: var(--line-hard); box-shadow: var(--glow-soft); color: var(--text); }
  .nc-btn.primary { background: color-mix(in srgb, var(--accent) 12%, transparent); border-color: color-mix(in srgb, var(--accent) 60%, transparent); color: #d6f4ff; }
  .nc-btn.primary:hover { background: color-mix(in srgb, var(--accent) 22%, transparent); box-shadow: 0 0 0 1px var(--accent), 0 0 18px color-mix(in srgb, var(--accent) 40%, transparent); }
  .nc-btn.ghost { background: transparent; }
  .nc-btn.danger { border-color: rgba(251,59,95,0.5); color: var(--danger); }
  .nc-btn:disabled,
  .nc-btn.disabled {
    opacity: 0.45;
    cursor: not-allowed;
    box-shadow: none !important;
  }
  .nc-btn.primary:disabled,
  .nc-btn.primary.disabled {
    background: color-mix(in srgb, var(--accent) 6%, transparent);
    border-color: var(--line);
    color: var(--muted);
  }

  /* Holographic outline */
  .holo {
    position: relative;
  }
  .holo::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: inherit;
    pointer-events: none;
    background:
      linear-gradient(135deg, transparent 40%, color-mix(in srgb, var(--accent) 12%, transparent) 50%, transparent 60%);
    mix-blend-mode: screen;
    opacity: .5;
  }

  /* Divider */
  .nc-hr { height: 1px; background: linear-gradient(90deg, transparent, var(--line-hard), transparent); border: 0; }

  /* Tag */
  .tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 8px;
    border: 1px solid var(--line);
    border-radius: var(--radius-pill, 999px);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-soft);
    background: color-mix(in srgb, var(--accent) 5%, transparent);
  }
  .tag.cyan { color: var(--accent-2); border-color: color-mix(in srgb, var(--accent-2) 35%, transparent); background: color-mix(in srgb, var(--accent-2) 5%, transparent); }
  .tag.blue { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 45%, transparent); background: color-mix(in srgb, var(--accent) 6%, transparent); }
  .tag.violet { color: var(--violet); border-color: rgba(139,92,246,0.45); background: rgba(139,92,246,0.08); }
  .tag.amber { color: var(--amber); border-color: rgba(250,204,21,0.45); background: rgba(250,204,21,0.06); }
  .tag.red { color: var(--danger); border-color: rgba(251,59,95,0.45); background: rgba(251,59,95,0.06); }
  .tag.boundary { color: var(--boundary); border-color: rgba(224,169,73,0.45); background: rgba(224,169,73,0.08); }
  .tag.green { color: var(--green); border-color: rgba(34,211,154,0.45); background: rgba(34,211,154,0.06); }
  .tag.muted { color: var(--muted); border-color: rgba(100,116,139,0.35); background: rgba(100,116,139,0.06); }

  /* Inputs */
  .nc-input, .nc-select, .nc-textarea {
    width: 100%;
    background: rgba(2,6,23,0.7);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 9px 12px;
    font-family: var(--mono);
    font-size: 12px;
    border-radius: var(--radius-control, 2px);
    outline: none;
  }
  .nc-input:focus, .nc-select:focus, .nc-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 30%, transparent); }

  /* Sidebar — calm nav: quiet hover, single accent rail marks "this one" */
  .nc-sidebar a {
    display: flex; align-items: center; gap: 12px;
    min-height: 36px;
    padding: 8px 14px;
    margin: 1px 8px;
    color: var(--text-soft);
    text-decoration: none;
    font-family: var(--display);
    font-size: 13.5px;
    border-radius: 8px;
    cursor: pointer;
    position: relative;
    transition: background .15s ease, color .15s ease;
  }
  .nc-sidebar a:hover { background: color-mix(in srgb, var(--text) 5%, transparent); color: var(--text); }
  .nc-sidebar a.active {
    background: var(--panel);
    color: var(--text);
    font-weight: 500;
  }
  .nc-sidebar a.active::before {
    content: ''; position: absolute; left: 0; top: 6px; bottom: 6px;
    width: 3px; border-radius: 2px;
    background: var(--accent);
  }
  .nc-sidebar a.active { padding-left: 20px; }
  .nc-sidebar a.active svg { color: var(--accent); }
  .nc-sidebar a.disabled { opacity: 0.45; cursor: not-allowed; }

  /* Util grid bg */
  .grid-bg {
    background-image:
      linear-gradient(color-mix(in srgb, var(--accent) 6%, transparent) 1px, transparent 1px),
      linear-gradient(90deg, color-mix(in srgb, var(--accent) 6%, transparent) 1px, transparent 1px);
    background-size: 24px 24px;
  }

  /* Card hover tilt feel */
  .tilt { transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease; }
  .tilt:hover { transform: translateY(-2px); border-color: var(--line-hard); }

  /* Bar */
  .bar-track { background: color-mix(in srgb, var(--accent) 8%, transparent); height: 4px; border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); box-shadow: 0 0 8px var(--accent); }

  /* Hide scrollbar */
  .no-scrollbar::-webkit-scrollbar { display: none; }

  /* Animated cursor */
  .cursor::after { content: '_'; color: var(--accent); animation: blink 1s steps(2) infinite; margin-left: 2px; }

  /* App layout */
  .app {
    display: grid;
    /* Shell dimensions are driven by the active layout (data-layout) via the
       LAYOUTS registry (themes/registry.ts). Fallbacks = the compact defaults
       so a missing token never collapses the grid to `auto`. */
    grid-template-columns: var(--shell-sidebar-width, 240px) 1fr;
    grid-template-rows: var(--shell-topbar-height, 56px) 1fr var(--shell-footer-height, 32px);
    height: 100vh;
    height: 100dvh; /* Dynamic viewport height for mobile */
    width: 100vw;
    position: relative;
    z-index: 3;
  }
  .app.collapsed { grid-template-columns: var(--shell-sidebar-rail, 64px) 1fr; }
  .app .topbar { grid-column: 1 / 3; grid-row: 1; }
  .app .sidebar { grid-column: 1; grid-row: 2 / 4; }
  .app .main    { grid-column: 2; grid-row: 2; overflow: auto; -webkit-overflow-scrolling: touch; }
  .app .footer  { grid-column: 2; grid-row: 3; }

  /* Large tablet / small desktop: auto-collapse sidebar.
     Also FREEZE topbar/footer rows to the compact literals here so a roomy
     layout (data-layout=comfortable) never applies its taller 68/44 rows below
     desktop — sub-desktop magic-numbers (e.g. the .chat-sessions.mob-open
     top:56/bottom:32 drawer offsets) assume the compact 56/32 shell. This is
     the desktop-only guarantee for layout presets (ASAGI blocker #2). */
  @media (max-width: 1024px) {
    .app { grid-template-columns: 64px 1fr; grid-template-rows: 56px 1fr 32px; }
    .app.collapsed { grid-template-columns: 64px 1fr; }
  }
  
  /* Small tablet: even narrower collapsed sidebar */
  @media (max-width: 768px) {
    .app { grid-template-columns: 56px 1fr; }
    .app.collapsed { grid-template-columns: 56px 1fr; }
  }

  /* Mobile menu button */
  #mobile-menu-btn {
    display: none;
    position: fixed;
    top: calc(6px + env(safe-area-inset-top, 0px));
    left: calc(6px + env(safe-area-inset-left, 0px));
    z-index: 400;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 4px;
    width: 34px;
    height: 34px;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text);
    font-size: 16px;
    line-height: 1;
    -webkit-tap-highlight-color: transparent;
  }
  #mobile-menu-btn:active {
    background: var(--panel);
  }

  /* Mobile overlay */
  #sidebar-mob-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 299;
    opacity: 0;
    transition: opacity 0.25s ease;
    -webkit-tap-highlight-color: transparent;
  }
  #sidebar-mob-overlay.open {
    display: block;
    opacity: 1;
  }

  /* Mobile: sidebar becomes a slide-over overlay */
  @media (max-width: 640px) {
    #mobile-menu-btn { display: flex; }
    
    .app {
      grid-template-columns: 1fr !important;
      grid-template-rows: calc(48px + env(safe-area-inset-top, 0px)) 1fr 0 !important;
      width: 100vw !important;
      max-width: 100vw !important;
      /* NOTE: do NOT put padding on the grid container — safe-area padding is on the
         individual grid areas (.topbar, .main) to avoid double-insetting. */
    }
    .app.collapsed {
      grid-template-columns: 1fr !important;
    }
    .app .topbar  { 
      grid-column: 1 !important; 
      padding-left: calc(44px + env(safe-area-inset-left, 0px)) !important;
      padding-right: calc(8px + env(safe-area-inset-right, 0px)) !important;
      padding-top: env(safe-area-inset-top, 0px) !important;
      height: calc(48px + env(safe-area-inset-top, 0px)) !important;
      width: 100%;
    }
    .app .sidebar {
      position: fixed;
      top: 0; 
      left: 0; 
      bottom: 0;
      width: calc(240px + env(safe-area-inset-left, 0px));
      max-width: 75vw;
      z-index: 300;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      grid-column: unset !important;
      grid-row: unset !important;
      background: linear-gradient(180deg, rgba(7,17,31,0.98), rgba(2,6,23,0.98));
      box-shadow: 4px 0 20px rgba(0,0,0,0.5);
      padding-top: env(safe-area-inset-top, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .app .sidebar.mob-open { 
      transform: translateX(0); 
    }
    .app .main { 
      grid-column: 1 !important; 
      padding: 8px;
      width: 100% !important;
      max-width: 100% !important;
      box-sizing: border-box;
    }
    .app .main > * {
      max-width: 100%;
      box-sizing: border-box;
    }
    .app .footer { 
      display: none !important;
    }
  }

  /* Chart bars */
  .chart-bar {
    background: linear-gradient(180deg, var(--accent), color-mix(in srgb, var(--accent) 20%, transparent));
    box-shadow: 0 0 12px color-mix(in srgb, var(--accent) 30%, transparent);
    width: 100%;
    border-radius: 1px 1px 0 0;
  }

  /* Glowing orb */
  .orb {
    width: 220px; height: 220px; border-radius: 50%;
    background:
      radial-gradient(circle at 35% 30%, rgba(255,255,255,0.55), transparent 30%),
      radial-gradient(circle at 50% 50%, color-mix(in srgb, var(--accent) 55%, transparent), color-mix(in srgb, var(--accent) 0%, transparent) 70%),
      radial-gradient(circle at 50% 50%, color-mix(in srgb, var(--accent-2) 40%, transparent), color-mix(in srgb, var(--accent-2) 0%, transparent) 60%);
    box-shadow: 0 0 80px color-mix(in srgb, var(--accent) 40%, transparent), inset 0 0 60px color-mix(in srgb, var(--accent) 20%, transparent);
    position: relative;
    animation: orb-spin 18s linear infinite;
  }
  .orb::before, .orb::after {
    content: ''; position: absolute; inset: -8px;
    border: 1px dashed color-mix(in srgb, var(--accent) 35%, transparent); border-radius: 50%;
    animation: orb-rot 14s linear infinite;
  }
  .orb::after {
    inset: -22px;
    border-color: color-mix(in srgb, var(--accent-2) 18%, transparent);
    animation-duration: 28s;
    animation-direction: reverse;
  }
  @keyframes orb-spin {
    0% { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(20deg); }
  }
  @keyframes orb-rot {
    0% { transform: rotate(0); }
    100% { transform: rotate(360deg); }
  }

  /* Streaming dots */
  .stream-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-right: 3px; animation: streamb 1.4s ease-in-out infinite; }
  .stream-dot:nth-child(2) { animation-delay: 0.2s; }
  .stream-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes streamb { 0%,80%,100%{opacity:.2;transform:translateY(0)} 40%{opacity:1;transform:translateY(-2px)} }

  .tab-bar {
    display: flex; gap: 0; border-bottom: 1px solid var(--line);
  }
  .tab-bar > .tab {
    padding: 10px 16px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .15s ease;
  }
  .tab-bar > .tab:hover { color: var(--text); }
  .tab-bar > .tab.active { color: var(--accent); border-bottom-color: var(--accent); box-shadow: 0 1px 0 var(--accent); }

  /* Loading bars on cards */
  .skel-bar {
    height: 8px; background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 4%, transparent), color-mix(in srgb, var(--accent) 18%, transparent), color-mix(in srgb, var(--accent) 4%, transparent));
    background-size: 200% 100%;
    animation: skel 2s linear infinite;
    border-radius: 2px;
  }
  @keyframes skel { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .stripe-bg {
    background-image: repeating-linear-gradient(45deg, color-mix(in srgb, var(--accent) 4%, transparent) 0 6px, transparent 6px 12px);
  }

  /* Modal */
  .modal-back {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(0,8,20,0.7);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
  }

  /* Tooltip-like chip */
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 8px;
    background: rgba(2,6,23,0.7);
    border: 1px solid var(--line);
    border-radius: var(--radius-pill, 999px);
    font-family: var(--mono); font-size: 10px;
    color: var(--text-soft);
    letter-spacing: 0.06em;
  }

  /* Footer — ambient row is calm; dev telemetry lives in a collapsible strip */
  .footer-ambient {
    height: 100%; display: flex; align-items: center; gap: 18px; padding: 0 14px;
  }
  .footer-dev-toggle {
    display: inline-flex; align-items: center; gap: 4px;
    background: transparent; border: none; cursor: pointer;
    color: var(--muted); font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em;
    padding: 2px 4px; transition: color .15s ease;
  }
  .footer-dev-toggle:hover { color: var(--text-soft); }
  .footer-dev-toggle svg { transition: transform .18s ease; }
  .footer-dev-toggle.open svg { transform: rotate(180deg); }
  .footer-dev-strip {
    height: 30px; display: flex; align-items: center; gap: 16px; padding: 0 14px;
    border-top: 1px solid var(--line-soft); background: var(--bg-0);
    font-family: var(--mono); font-size: 10px; color: var(--muted);
    overflow-x: auto; white-space: nowrap;
  }
  .footer-dev-strip span b { color: var(--text-soft); font-weight: 500; }

  /* System status pill (TopBar) — one calm entry point, details live in the popover */
  .sys-pill {
    display: inline-flex; align-items: center; gap: 8px;
    background: transparent; border: 1px solid var(--line); border-radius: 999px;
    padding: 5px 12px; cursor: pointer; color: var(--text-soft);
    font-family: var(--display); font-size: 12px; transition: border-color .15s ease, background .15s ease;
  }
  .sys-pill:hover { background: color-mix(in srgb, var(--text) 4%, transparent); border-color: var(--line-hard, var(--line)); }
  .sys-pill .dot { width: 6px; height: 6px; }
  .sys-popover-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px; font-family: var(--mono); font-size: 11px;
  }
  .sys-popover-row + .sys-popover-row { border-top: 1px dashed var(--line-soft); }
  .sys-popover-row .k { color: var(--muted); letter-spacing: 0.06em; }
  .sys-popover-row .v { color: var(--text); }

  /* SVG icons base */
  .ico { width: 16px; height: 16px; flex: none; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }

  /* Docs prose */
  .nc-prose { color: var(--text); font-size: 14px; line-height: 1.6; max-width: 880px; }
  .nc-prose h1 { font-family: var(--display); font-size: 26px; margin: 0 0 16px; color: var(--text); border-bottom: 1px solid var(--line-soft); padding-bottom: 10px; }
  .nc-prose h2 { font-family: var(--display); font-size: 18px; margin: 24px 0 10px; color: var(--accent-2); }
  .nc-prose h3 { font-family: var(--display); font-size: 15px; margin: 20px 0 8px; color: var(--text-soft); }
  .nc-prose p  { margin: 0 0 12px; }
  .nc-prose ul, .nc-prose ol { margin: 0 0 12px 20px; padding: 0; }
  .nc-prose li { margin: 4px 0; }
  .nc-prose a  { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
  .nc-prose code { background: color-mix(in srgb, var(--accent) 10%, transparent); padding: 1px 6px; border-radius: var(--radius-inline, 4px); font-family: var(--mono); font-size: 12px; }
  .nc-prose pre { background: var(--panel); padding: 12px 14px; border-radius: var(--radius-panel, 6px); border: 1px solid var(--line-soft); overflow-x: auto; }
  .nc-prose pre code { background: transparent; padding: 0; font-size: 12px; }
  .nc-prose blockquote { border-left: 3px solid var(--accent); padding: 6px 14px; color: var(--text-soft); background: color-mix(in srgb, var(--accent) 5%, transparent); margin: 0 0 12px; }
  .nc-prose table { border-collapse: collapse; margin: 0 0 12px; font-size: 13px; }
  .nc-prose th, .nc-prose td { padding: 6px 12px; border: 1px solid var(--line-soft); text-align: left; }
  .nc-prose th { background: var(--panel); color: var(--text); }

  /* ============================================================
     RESPONSIVE UTILITY CLASSES
     Mobile-first approach for PWA compatibility
     ============================================================ */

  /* Responsive grid utilities */
  .grid-responsive {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  }
  .grid-responsive-sm {
    display: grid;
    gap: 10px;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  }
  .grid-responsive-lg {
    display: grid;
    gap: 14px;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  }

  /* Stat cards - 4 columns on desktop, auto-fit on mobile */
  .stat-grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(4, 1fr);
    width: 100%;
  }
  @media (max-width: 1200px) {
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 640px) {
    .stat-grid { 
      grid-template-columns: 1fr !important; 
      width: 100% !important;
      gap: 8px !important;
    }
    .stat-grid > * {
      width: 100% !important;
    }
  }

  /* ── Fixed-sidebar + flex/grid content split (Backlot, Dream journal, Interactive,
     NeuroLab, MCP form rows). Pages set their own desktop widths inline
     (width:260, gridTemplateColumns:'220px 1fr', etc) — these !important rules
     beat that inline style at narrow widths, same pattern as .chat-layout above. */
  @media (max-width: 768px) {
    .split-flex { flex-direction: column !important; }
    .split-flex-fixed {
      width: 100% !important;
      max-width: none !important;
      flex-shrink: 1 !important;
    }
    .split-grid { grid-template-columns: 1fr !important; }
  }

  /* ── Label + control form rows (Settings, MCP editor, Secrets forms): the
     inline gridTemplateColumns (e.g. '220px 1fr') is too tight under ~360px
     of viewport width, so stack label above control. */
  @media (max-width: 640px) {
    .setting-row { grid-template-columns: 1fr !important; gap: 6px !important; }
  }

  /* ── Dense data-table rows (Providers/Usage/Comms/Hivemind/Logs/Channels/
     Approvals): many fixed-px columns for alignment don't reflow into a
     stacked card view safely, so scroll the row horizontally instead of
     silently clipping or squeezing data unreadable on a phone. */
  .table-scroll { overflow-x: visible; -webkit-overflow-scrolling: touch; }
  @media (max-width: 768px) {
    .table-scroll { overflow-x: auto !important; overflow-y: visible; }
  }

  /* ── Secrets audit-row (5 fixed-px columns): reduce column count instead of
     squeezing, matching the v4 dashboard's equivalent .audit-row treatment. */
  @media (max-width: 768px) {
    .audit-row { grid-template-columns: 70px 90px 1fr 60px !important; }
    .audit-row span:nth-child(3) { display: none; }
  }
  @media (max-width: 640px) {
    /* 3 spans remain visible (event, message, outcome) once time+agent are
       hidden below — 3 tracks, not 2, so the outcome badge doesn't get
       squeezed into the message column. */
    .audit-row { grid-template-columns: auto 1fr auto !important; gap: 6px !important; }
    .audit-row span:nth-child(1),
    .audit-row span:nth-child(3) { display: none; }
  }

  /* ── Modal dialogs with a fixed desktop pixel width (Cmd palette, etc):
     .modal-back has no padding, so a `width:560` child overflows a
     320-375px phone unclipped. Clamp to viewport width. */
  @media (max-width: 640px) {
    .modal-fixed-width { width: calc(100vw - 32px) !important; max-width: none !important; }
  }

  /* ── Topbar-anchored dropdown panels (notification bell, etc): the inline
     `position:absolute; right:0; width:360` popup overflows a 320-375px
     phone since it's anchored to an icon that isn't at the viewport edge.
     Detach it into a viewport-clamped sheet below the topbar instead. */
  @media (max-width: 480px) {
    .notif-panel {
      position: fixed !important;
      left: 8px !important;
      right: 8px !important;
      top: calc(48px + env(safe-area-inset-top, 0px) + 4px) !important;
      width: auto !important;
      max-width: none !important;
      max-height: calc(100dvh - 96px) !important;
    }
  }

  /* Flex utilities */
  .flex-wrap-mobile {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .flex-col-mobile {
    display: flex;
    gap: 12px;
  }
  @media (max-width: 768px) {
    .flex-col-mobile { flex-direction: column; }
  }

  /* Hide/show utilities */
  .hide-mobile { display: block; }
  .show-mobile { display: none; }
  .hide-tablet { display: block; }
  @media (max-width: 768px) {
    .hide-tablet { display: none !important; }
  }
  @media (max-width: 640px) {
    .hide-mobile { display: none !important; }
    .show-mobile { display: block !important; }
    .show-mobile-flex { display: flex !important; }
    .show-mobile-grid { display: grid !important; }
  }

  /* Full width on mobile */
  .full-mobile {
    width: auto;
  }
  @media (max-width: 640px) {
    .full-mobile { width: 100%; }
  }

  /* Stack layout - horizontal on desktop, vertical on mobile */
  .stack {
    display: flex;
    gap: 16px;
  }
  .stack-reverse { flex-direction: row-reverse; }
  @media (max-width: 768px) {
    .stack { flex-direction: column; }
    .stack-reverse { flex-direction: column-reverse; }
  }

  /* Horizontal scroll container for mobile */
  .scroll-x-mobile {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
  }
  @media (max-width: 768px) {
    .scroll-x-mobile {
      display: flex;
      flex-wrap: nowrap;
      gap: 12px;
      padding-bottom: 8px;
    }
    .scroll-x-mobile > * {
      flex: 0 0 auto;
      min-width: 280px;
    }
  }

  /* Kanban-specific mobile styles */
  .kanban-grid {
    display: grid;
    gap: 14px;
    grid-template-columns: repeat(4, 1fr);
  }
  @media (max-width: 1100px) {
    .kanban-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 640px) {
    .kanban-grid {
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x mandatory;
      gap: 12px;
      padding-bottom: 12px;
    }
    .kanban-grid > * {
      flex: 0 0 85vw;
      scroll-snap-align: start;
      max-width: 320px;
    }
  }

  /* Chat layout — Calm Instrument: rail | thread, inspector opt-in 3rd col */
  .chat-layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 12px;
    height: 100%;
  }
  .chat-layout.inspector-open { grid-template-columns: 260px 1fr 320px; }
  .chat-sessions, .chat-inspector, .chat-thread { border-color: var(--line-soft); }
  .chat-inspector { display: none; flex-direction: column; overflow: hidden; padding: 0; }
  .chat-layout.inspector-open .chat-inspector { display: flex; }
  .chat-inspector-toggle.is-active { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 45%, transparent); background: color-mix(in srgb, var(--accent) 10%, transparent); }

  /* Sessions rail rows */
  .chat-rail-row {
    padding: 10px 14px;
    border-bottom: 1px solid var(--line-soft);
    border-left: 2px solid transparent;
    cursor: pointer;
    transition: background .12s ease, border-color .12s ease;
  }
  .chat-rail-row:hover { background: color-mix(in srgb, var(--accent) 6%, transparent); }
  .chat-rail-row.active { border-left-color: var(--accent); background: color-mix(in srgb, var(--accent) 5%, transparent); }
  .chat-rail-title { font-family: var(--display); font-size: 13px; font-weight: 500; color: var(--text-soft); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chat-rail-row.active .chat-rail-title { color: var(--text); }
  .chat-rail-meta { font-family: var(--display); font-size: 11px; color: var(--muted); }
  .chat-rail-icon-btn {
    background: transparent; border: none; color: var(--muted); cursor: pointer;
    padding: 4px; border-radius: var(--radius-inline, 4px); display: inline-flex; align-items: center; justify-content: center;
    transition: color .12s ease, background .12s ease;
  }
  .chat-rail-icon-btn:hover { color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, transparent); }
  .chat-rail-icon-btn.is-active { color: var(--accent); }
  /* Session-rail row actions: reveal on hover (touch devices always show). */
  .chat-sess-actions { opacity: 0; transition: opacity .12s ease; }
  .chat-sess-row:hover .chat-sess-actions { opacity: 1; }
  @media (hover: none) { .chat-sess-actions { opacity: 1; } }

  /* Thread header — quiet pill controls, no mono title bar */
  .chat-thread-header { padding: 14px 18px; border-bottom: 1px solid var(--line-soft); display: flex; align-items: center; gap: 12px; }
  .chat-thread-name { font-family: var(--display); font-size: 15px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chat-thread-sub { font-family: var(--display); font-size: 11px; color: var(--muted); margin-top: 2px; display: flex; gap: 10px; align-items: center; }
  .chat-pill-select, .chat-pill-btn {
    border: 1px solid var(--line-soft); border-radius: var(--radius-pill, 999px);
    background: transparent; color: var(--text-soft); font-family: var(--display); font-size: 12px;
    padding: 6px 12px; cursor: pointer; transition: all .12s ease;
  }
  .chat-pill-btn:hover, .chat-pill-select:hover { border-color: var(--accent); color: var(--text); }
  .chat-pill-btn.is-active { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 45%, transparent); background: color-mix(in srgb, var(--accent) 8%, transparent); }

  /* Message bubbles — proportional prose, hairline surfaces (no gradients) */
  .chat-bubble { border: 1px solid var(--line-soft); padding: 14px 16px; }
  .chat-bubble-user { background: color-mix(in srgb, var(--accent) 8%, var(--panel)); border-color: color-mix(in srgb, var(--accent) 25%, var(--line-soft)); border-radius: var(--radius-panel, 6px) var(--radius-panel, 6px) 4px var(--radius-panel, 6px); }
  .chat-bubble-agent { background: var(--panel); border-radius: var(--radius-panel, 6px) var(--radius-panel, 6px) var(--radius-panel, 6px) 4px; }
  .chat-bubble-meta { font-family: var(--display); font-size: 11px; color: var(--muted); }
  .chat-bubble-body { font-family: var(--display); font-size: 14.5px; line-height: 1.55; color: var(--text); }
  .chat-bubble-body code, .chat-bubble-body pre, .chat-bubble-body pre code { font-family: var(--mono); }
  .chat-cursor { display: inline-block; color: var(--accent); animation: chat-cursor-pulse 1.2s ease-in-out infinite; }
  @keyframes chat-cursor-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }

  /* Composer — stacked textarea + action row, circular icon buttons */
  .chat-composer-shell { border: 1px solid var(--line-soft); border-radius: var(--radius-panel, 6px); padding: 12px; background: var(--panel); }
  .chat-composer-textarea {
    width: 100%; background: transparent; border: 0; outline: 0;
    color: var(--text); font-family: var(--display); font-size: 14px;
    resize: none; line-height: 1.5; min-height: 24px; max-height: 160px; overflow-y: auto;
  }
  .chat-composer-actions { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line-soft); }
  .chat-icon-btn {
    width: 30px; height: 30px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
    background: transparent; border: 1px solid transparent; color: var(--muted); cursor: pointer; transition: all .12s ease; flex: none;
  }
  .chat-icon-btn:hover { color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, transparent); }
  .chat-icon-btn.is-active { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 35%, transparent); background: color-mix(in srgb, var(--accent) 10%, transparent); }
  .chat-icon-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .chat-send-btn {
    background: var(--accent); color: var(--icon-on-accent, #04141c); border: none; border-radius: var(--radius-pill, 999px);
    padding: 8px 16px; font-family: var(--display); font-size: 12px; font-weight: 600; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px; transition: opacity .12s ease; flex: none;
  }
  .chat-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .chat-kbd-hint { font-family: var(--display); font-size: 11px; color: var(--muted); margin-left: auto; white-space: nowrap; }

  @media (max-width: 1024px) {
    .chat-layout, .chat-layout.inspector-open { grid-template-columns: 200px 1fr !important; }
    /* !important beats the inline style={{display:'flex'}} on the panel */
    .chat-layout .chat-inspector, .chat-layout.inspector-open .chat-inspector { display: none !important; }
    .chat-inspector-toggle { display: none !important; }
  }
  @media (max-width: 768px) {
    .chat-layout, .chat-layout.inspector-open { grid-template-columns: 1fr !important; }
    /* !important beats the inline style={{display:'flex'}} on the panel */
    .chat-layout .chat-sessions { display: none !important; }
    .chat-layout .chat-sessions.mob-open {
      display: flex !important;   /* keep the internal flex-column layout */
      flex-direction: column;
      position: fixed;
      top: 56px; left: 0; bottom: 32px;
      width: min(300px, 85vw);
      z-index: 320;               /* above the mobile sidebar overlay */
      background: var(--panel);
      border-right: 1px solid var(--line);
      box-shadow: 4px 0 24px rgba(0,0,0,0.6);
    }
  }
  @media (max-width: 640px) {
    .chat-layout .chat-sessions.mob-open {
      top: calc(48px + env(safe-area-inset-top, 0px));
      bottom: calc(52px + env(safe-area-inset-bottom, 0px));
    }
  }

  /* ── Mobile chat header / composer ───────────────────────────────────
     Composer is a vertical stack (textarea, then action row) at every
     width already, so no wrap hack is needed there. On a phone, drop the
     redundant thread name/sub line (topbar already reads "Chat") and let
     the agent picker fill the row; give action-row icon buttons roomier
     touch targets. */
  @media (max-width: 640px) {
    .chat-icon-btn { width: 36px; height: 36px; }
    .chat-send-btn { min-height: 36px; }
    .chat-kbd-hint { display: none; }
    .chat-thread-name, .chat-thread-sub { display: none !important; }
    .chat-pill-select { flex: 1 1 auto; width: auto !important; min-width: 0; }
  }

  /* Overview 3-column layout */
  .overview-3col {
    display: grid;
    grid-template-columns: 1.1fr 1.5fr 1.1fr;
    gap: 16px;
    align-items: start;
    width: 100%;
  }
  @media (max-width: 1024px) {
    .overview-3col { grid-template-columns: 1fr 1fr; }
    .overview-3col > :nth-child(2) { grid-column: span 2; order: -1; }
  }
  @media (max-width: 768px) {
    .overview-3col { 
      grid-template-columns: 1fr; 
      gap: 10px;
    }
    .overview-3col > :nth-child(2) { grid-column: span 1; order: 0; }
  }
  @media (max-width: 640px) {
    .overview-3col { 
      grid-template-columns: 1fr !important; 
      gap: 8px !important;
      width: 100% !important;
    }
    .overview-3col > * {
      width: 100% !important;
      max-width: 100% !important;
    }
  }

  /* Center orb container */
  .orb-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 260px;
  }
  @media (max-width: 640px) {
    .orb-container { min-height: 200px; }
    .orb-container .orb {
      width: 160px;
      height: 160px;
    }
  }

  /* ============================================================
     OVERVIEW — "Calm Instrument"
     Hairline-bordered blocks instead of stacked glow panels; one
     breathing hero (Atrium) instead of a busy orb; restrained motion.
     ============================================================ */

  .ov-atrium {
    border: 1px solid var(--line-soft);
    border-radius: var(--radius-panel, 6px);
    padding: 20px 24px;
    margin-bottom: 24px;
  }
  .ov-atrium-top { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .ov-atrium-meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .ov-eyebrow {
    font-family: var(--mono); font-size: 10px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted);
  }
  .ov-state-word {
    font-family: var(--display); font-size: 24px; font-weight: 600;
    letter-spacing: -0.01em; text-transform: capitalize; line-height: 1.15;
  }
  .ov-atrium-readouts { display: flex; align-items: center; gap: 22px; margin-left: auto; flex-wrap: wrap; }
  .ov-readout { display: flex; flex-direction: column; gap: 2px; }
  .ov-readout__label { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); }
  .ov-readout__value { font-size: 13px; color: var(--text-soft); }
  .ov-whisper { margin-top: 12px; font-size: 11px; color: var(--text-soft); opacity: 0.85; }
  .ov-whisper.is-error { color: var(--danger); }

  /* Breathing hero dot — replaces the old 220px orb */
  .ov-breath { position: relative; width: 56px; height: 56px; flex: none; }
  .ov-breath__ring, .ov-breath__halo, .ov-breath__core { position: absolute; border-radius: 50%; }
  .ov-breath__ring { inset: 0; border: 1px solid color-mix(in srgb, var(--accent-2) 30%, transparent); }
  .ov-breath__halo { inset: 8px; background: radial-gradient(circle, var(--accent-2), transparent 70%); opacity: 0.35; animation: ov-breathe 4.2s ease-in-out infinite; }
  .ov-breath__core { inset: 20px; background: var(--accent-2); box-shadow: 0 0 16px color-mix(in srgb, var(--accent-2) 60%, transparent); }
  .ov-breath--warn .ov-breath__ring { border-color: color-mix(in srgb, var(--amber) 30%, transparent); }
  .ov-breath--warn .ov-breath__halo { background: radial-gradient(circle, var(--amber), transparent 70%); animation: ov-flicker 1.2s ease-in-out infinite; }
  .ov-breath--warn .ov-breath__core { background: var(--amber); box-shadow: 0 0 16px color-mix(in srgb, var(--amber) 60%, transparent); }
  .ov-breath--off .ov-breath__ring { border-color: color-mix(in srgb, var(--danger) 30%, transparent); animation: ov-spin 24s linear infinite; }
  .ov-breath--off .ov-breath__halo { opacity: 0.16; animation: none; }
  .ov-breath--off .ov-breath__core { background: var(--danger); animation: ov-pulse-red 0.7s ease-in-out infinite; }
  .ov-breath--boot .ov-breath__halo { background: radial-gradient(circle, var(--accent), transparent 70%); animation: ov-breathe 2.2s ease-in-out infinite; }
  .ov-breath--boot .ov-breath__core { background: var(--accent); box-shadow: 0 0 16px color-mix(in srgb, var(--accent) 60%, transparent); }
  @keyframes ov-breathe   { 0%, 100% { transform: scale(0.92); opacity: 0.3; } 50% { transform: scale(1.08); opacity: 0.5; } }
  @keyframes ov-flicker   { 0%, 100% { opacity: 0.28; } 50% { opacity: 0.5; } }
  @keyframes ov-spin      { to { transform: rotate(360deg); } }
  @keyframes ov-pulse-red { 0%, 100% { opacity: 0.7; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }
  @media (prefers-reduced-motion: reduce) {
    .ov-breath__halo, .ov-breath__ring, .ov-breath__core { animation: none !important; }
  }

  /* Subsystem chips — six quiet dot+label pairs, no fill/chrome */
  .ov-subsystems { display: flex; flex-wrap: wrap; align-items: center; gap: 8px 18px; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line-soft); }
  .ov-subsystem { display: flex; align-items: center; gap: 6px; }
  .ov-subsystem .mono { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-soft); }

  /* Section blocks — hairline border, no shadow/glow; replaces nc-panel.glow
     for Overview's secondary/tertiary rows */
  .ov-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; align-items: start; }
  .ov-block {
    border: 1px solid var(--line-soft);
    border-radius: var(--radius-panel, 6px);
    padding: 18px 20px;
  }
  .ov-block--flush { padding: 0; overflow: hidden; }
  .ov-block--aux { opacity: 0.94; }
  .ov-block__head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .ov-block__title { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); }
  .ov-vital { height: 4px; }
  .ov-vital__fill { transition: width 420ms cubic-bezier(0.4, 0, 0.2, 1); }
  .ov-list-row { display: flex; align-items: center; gap: 10px; padding: 9px 2px; }

  /* Roster — full-width roll-call, more breathing room than the old 3-col squeeze */
  .ov-roster { display: flex; flex-direction: column; }
  .ov-roster-row {
    display: grid; grid-template-columns: 32px 1fr auto auto; align-items: center; gap: 12px;
    padding: 11px 2px; border-bottom: 1px solid var(--line-soft); transition: background 160ms ease-out;
  }
  .ov-roster-row:last-child { border-bottom: none; }
  .ov-roster-row:hover { background: color-mix(in srgb, var(--accent) 4%, transparent); }
  .ov-roster-avatar {
    width: 30px; height: 30px; border-radius: var(--radius-control, 6px);
    display: flex; align-items: center; justify-content: center; overflow: hidden;
    font-family: var(--mono); font-size: 11px; font-weight: 700;
  }
  .ov-roster-name { font-family: var(--mono); font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ov-roster-sub { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 1px; }

  @media (max-width: 1024px) {
    .ov-row { grid-template-columns: 1fr; }
    .ov-atrium-readouts { margin-left: 0; }
  }
  @media (max-width: 640px) {
    .ov-atrium-top { gap: 14px; }
    .ov-breath { width: 44px; height: 44px; }
    .ov-state-word { font-size: 20px; }
    .ov-roster-row { grid-template-columns: 28px 1fr auto; }
    .ov-roster-row > .mono.muted { display: none; }
  }

  /* Touch-friendly button sizes */
  @media (max-width: 640px) {
    .nc-btn {
      padding: 10px 14px;
      font-size: 12px;
      min-height: 44px; /* iOS touch target */
    }
    .nc-input, .nc-select, .nc-textarea {
      padding: 12px 14px;
      font-size: 16px; /* Prevents iOS zoom */
      min-height: 44px;
    }
  }

  /* Page header responsive */
  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .page-header-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  @media (max-width: 640px) {
    .page-header {
      flex-direction: column;
      align-items: flex-start;
    }
    .page-header-actions {
      width: 100%;
    }
    .page-header-actions > * {
      flex: 1;
      min-width: 120px;
    }
  }

  /* TopBar responsive */
  .topbar-content {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 0 16px;
    height: 100%;
  }
  .topbar-chips {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    flex: 1;
    max-width: 600px;
  }
  @media (max-width: 900px) {
    .topbar-chips { max-width: 300px; }
  }
  @media (max-width: 640px) {
    .topbar-chips {
      display: none;
    }
    .topbar-search {
      flex: 1;
    }
  }

  /* Mobile bottom nav (optional enhancement) */
  .mobile-bottom-nav {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 52px;
    background: var(--panel);
    border-top: 1px solid var(--line);
    z-index: 200;
    padding: 0 4px;
  }
  .mobile-bottom-nav-inner {
    display: flex;
    justify-content: space-around;
    align-items: center;
    height: 100%;
  }
  .mobile-bottom-nav a {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    padding: 4px 8px;
    color: var(--muted);
    text-decoration: none;
    font-family: var(--mono);
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    -webkit-tap-highlight-color: transparent;
  }
  .mobile-bottom-nav a.active { color: var(--accent); }
  .mobile-bottom-nav a svg { width: 18px; height: 18px; }
  @media (max-width: 640px) {
    .mobile-bottom-nav { display: block; }
    .app .footer { display: none; }
    /* The fixed live-status/debug badge (created in live-data.jsx) sits at
       bottom-left and covers the Home/Chat bottom-nav buttons on phones.
       Hide it on mobile — the topbar SYS chip already conveys live state. */
    #nc-live-status { display: none !important; }
    /* !important beats inline style={{ padding: N }} from JSX */
    .app .main { padding: 8px !important; padding-bottom: 52px !important; }
    /* Direct height override for chat — beats cached JSX inline style too */
    .chat-layout { height: calc(100dvh - 48px - 52px - 16px) !important; min-height: 0 !important; }
    :root {
      --chat-h: calc(100dvh - 48px - 52px - 16px);
      --chat-min-h: 0px;
    }
  }
  @media (max-width: 375px) {
    .mobile-bottom-nav {
      height: 48px;
    }
    .mobile-bottom-nav a {
      font-size: 7px;
      padding: 3px 6px;
    }
    .mobile-bottom-nav a svg { width: 16px; height: 16px; }
    .app .main { padding: 8px !important; padding-bottom: 48px !important; }
    .chat-layout { height: calc(100dvh - 48px - 48px - 16px) !important; }
    :root {
      --chat-h: calc(100dvh - 48px - 48px - 16px);
    }
  }

  /* Safe area insets for notched devices (iPhone X, 11, 12, 13, 14, 15 etc.) */
  @supports (padding: max(0px)) {
    /* Topbar: add padding AND increase height for safe area */
    .app .topbar { 
      padding-top: max(0px, env(safe-area-inset-top)); 
      /* Landscape: left/right insets when notch is on side */
      padding-left: max(16px, env(safe-area-inset-left));
      padding-right: max(16px, env(safe-area-inset-right));
    }
    
    /* Bottom nav: account for home indicator */
    .mobile-bottom-nav { 
      padding-bottom: max(0px, env(safe-area-inset-bottom)); 
      height: calc(52px + env(safe-area-inset-bottom));
      /* Landscape side insets */
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    
    /* Main content: landscape side insets */
    .app .main {
      padding-left: max(8px, env(safe-area-inset-left));
      padding-right: max(8px, env(safe-area-inset-right));
    }
    
    @media (max-width: 640px) {
      /* Grid rows must include safe area for topbar height */
      .app {
        grid-template-rows: calc(48px + env(safe-area-inset-top)) 1fr 0 !important;
      }
      
      /* Topbar height includes safe area */
      .app .topbar {
        height: calc(48px + env(safe-area-inset-top)) !important;
        padding-top: env(safe-area-inset-top);
        /* On mobile, account for menu button + safe area */
        padding-left: calc(44px + env(safe-area-inset-left)) !important;
      }
      
      /* Mobile menu button positioned below safe area */
      #mobile-menu-btn {
        top: calc(6px + env(safe-area-inset-top)) !important;
        left: calc(6px + env(safe-area-inset-left)) !important;
      }
      
      /* Sidebar needs top padding for notch when open */
      .app .sidebar {
        padding-top: env(safe-area-inset-top);
        padding-left: env(safe-area-inset-left);
      }
      
      /* Main content bottom padding for bottom nav */
      .app .main {
        padding-bottom: calc(52px + env(safe-area-inset-bottom)) !important;
      }
      .chat-layout {
        height: calc(100dvh - 48px - env(safe-area-inset-top, 0px) - 52px - env(safe-area-inset-bottom, 0px) - 16px) !important;
        min-height: 0 !important;
      }
      :root {
        --chat-h: calc(100dvh - 48px - env(safe-area-inset-top, 0px) - 52px - env(safe-area-inset-bottom, 0px) - 16px);
      }
    }

    @media (max-width: 375px) {
      /* Smaller topbar on tiny phones but still account for safe area */
      .app {
        grid-template-rows: calc(44px + env(safe-area-inset-top)) 1fr 0 !important;
      }

      .app .topbar {
        height: calc(44px + env(safe-area-inset-top)) !important;
      }

      .mobile-bottom-nav {
        height: calc(48px + env(safe-area-inset-bottom));
      }

      .app .main {
        padding-bottom: calc(48px + env(safe-area-inset-bottom)) !important;
      }
      .chat-layout {
        height: calc(100dvh - 44px - env(safe-area-inset-top, 0px) - 48px - env(safe-area-inset-bottom, 0px) - 16px) !important;
      }
      :root {
        --chat-h: calc(100dvh - 44px - env(safe-area-inset-top, 0px) - 48px - env(safe-area-inset-bottom, 0px) - 16px);
      }
    }
  }

  /* Table responsive - horizontal scroll */
  .table-responsive {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  @media (max-width: 768px) {
    .table-responsive table {
      min-width: 600px;
    }
  }

  /* Card grid for agents/sessions/etc */
  .card-grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  }
  @media (max-width: 640px) {
    .card-grid {
      grid-template-columns: 1fr;
    }
  }

  /* ============================================================
     AGENTS — "Calm Instrument" roster
     Hairline cards, quiet inline meta, icon-only actions. No
     per-card glow/tilt/gradient — matches Overview's ov-block language.
     ============================================================ */
  .ag-toolbar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 12px 16px; margin-bottom: 20px;
    border: 1px solid var(--line-soft); border-radius: var(--radius-panel, 6px);
  }
  .ag-toolbar-spacer { flex: 1; }

  .ag-grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
  @media (max-width: 640px) { .ag-grid { grid-template-columns: 1fr; } }

  .ag-card {
    border: 1px solid var(--line-soft);
    border-radius: var(--radius-panel, 6px);
    padding: 16px;
    background: var(--panel);
    transition: background 160ms ease-out, border-color 160ms ease-out;
  }
  .ag-card:hover { background: color-mix(in srgb, var(--accent) 3%, transparent); border-color: var(--line); }
  .ag-card.is-temp { border-color: color-mix(in srgb, var(--violet) 32%, var(--line-soft)); }
  .ag-card.is-inactive { opacity: 0.5; }

  .ag-head { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
  .ag-avatar {
    width: 40px; height: 40px; flex: none; border-radius: var(--radius-control, 8px);
    display: flex; align-items: center; justify-content: center; overflow: hidden;
    font-family: var(--display); font-weight: 600; font-size: 15px;
    background: color-mix(in srgb, var(--ag-accent, var(--accent)) 16%, transparent);
    color: var(--ag-accent, var(--accent));
    border: 1px solid color-mix(in srgb, var(--ag-accent, var(--accent)) 32%, transparent);
  }
  .ag-name { font-family: var(--display); font-size: 15px; font-weight: 600; letter-spacing: -0.005em; }
  .ag-role { font-family: var(--mono); font-size: 10.5px; color: var(--muted); margin-top: 1px; }
  .ag-desc { font-size: 12px; color: var(--text-soft); line-height: 1.5; margin-bottom: 12px; min-height: 18px; }
  .ag-meta { font-family: var(--mono); font-size: 10.5px; color: var(--muted); display: flex; flex-wrap: wrap; align-items: center; gap: 3px 0; margin-bottom: 12px; }
  .ag-meta b { color: var(--text-soft); font-weight: 500; }
  .ag-meta .sep { margin: 0 7px; opacity: 0.5; }
  .ag-caps { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; min-height: 20px; }
  .ag-actions { display: flex; align-items: center; gap: 6px; padding-top: 12px; border-top: 1px solid var(--line-soft); }
  .ag-actions .nc-btn.grow { flex: 1; }
  .ag-actions .nc-btn.icon-only { flex: none; width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center; }

  /* ============================================================
     MISSION CONTROL — "Calm Instrument"
     Quiet toolbars, hairline kanban columns/cards, hairline rail
     rows for Automation. No per-card glow/tilt/shadow-stack —
     matches Overview/Agents language. `.mc-bar.is-live` is the
     one deliberate exception (glow = something is actually running).
     ============================================================ */
  .mc-bar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 11px 16px; margin-bottom: 14px;
    border: 1px solid var(--line-soft); border-radius: var(--radius-panel, 6px);
    transition: border-color 200ms ease-out, background 200ms ease-out;
  }
  .mc-bar.is-live {
    border-color: color-mix(in srgb, var(--accent) 32%, var(--line-soft));
    background: color-mix(in srgb, var(--accent) 4%, transparent);
  }

  .mc-col {
    border: 1px solid var(--line-soft);
    border-radius: var(--radius-panel, 6px);
    overflow: hidden;
  }
  .mc-col-head {
    padding: 10px 14px; border-bottom: 1px solid var(--line-soft);
    display: flex; justify-content: space-between; align-items: center;
  }

  .mc-card {
    border: 1px solid var(--line-soft);
    border-radius: var(--radius-panel, 6px);
    padding: 11px;
    background: var(--panel);
    cursor: grab; user-select: none;
    transition: background 160ms ease-out, border-color 160ms ease-out;
  }
  .mc-card:hover { background: color-mix(in srgb, var(--accent) 3%, transparent); border-color: var(--line); }

  .mc-rail-row {
    padding: 10px 14px; cursor: pointer; position: relative;
    border-left: 2px solid transparent;
    transition: background 140ms ease-out, border-color 140ms ease-out;
  }
  .mc-rail-row:hover { background: color-mix(in srgb, var(--text) 3%, transparent); }
  .mc-rail-row.is-active { border-left-color: var(--accent); background: color-mix(in srgb, var(--accent) 6%, transparent); }
  .mc-rail-row .mc-rail-actions { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); display: flex; gap: 4px; opacity: 0; transition: opacity 140ms; }
  .mc-rail-row:hover .mc-rail-actions, .mc-rail-row.is-active .mc-rail-actions { opacity: 1; }
  .mc-rail-row .mc-rail-actions button { background: transparent; border: none; cursor: pointer; padding: 2px 4px; color: var(--muted); }
  .mc-rail-row .mc-rail-actions button:hover { color: var(--text); }

  .mc-pill {
    font-size: 9px; font-family: var(--mono); padding: 2px 8px; border-radius: var(--radius-pill, 999px);
    border: 1px solid var(--line-soft); background: transparent; color: var(--muted);
    cursor: pointer; text-transform: uppercase; letter-spacing: 0.08em; transition: all 140ms ease-out;
  }
  .mc-pill.is-active { border-color: color-mix(in srgb, var(--pill-accent, var(--accent)) 55%, transparent); color: var(--pill-accent, var(--accent)); background: color-mix(in srgb, var(--pill-accent, var(--accent)) 10%, transparent); }

  /* ============================================================
     STUDIO — "Calm Instrument"
     Shared toolbar/panel/card/split vocabulary for all 15 Studio
     sub-tabs (Canvas, NeuroLab, Terminal, Neuro Room, Interactive,
     Generate, Video, Music, Games, WebApps, Editor, Photopea,
     Gallery, Media, Backlot). No per-item glow/tilt/scan-line/
     stripe-bg — matches Overview/Agents/Mission Control language.
     `.st-toolbar.is-live` is the one deliberate glow exception
     (something is actively generating/rendering/connected).
     ============================================================ */
  .st-toolbar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 12px 16px; margin-bottom: 16px;
    border: 1px solid var(--line-soft); border-radius: var(--radius-panel, 6px);
    transition: border-color 200ms ease-out, background 200ms ease-out;
  }
  .st-toolbar.is-live {
    border-color: color-mix(in srgb, var(--accent) 32%, var(--line-soft));
    background: color-mix(in srgb, var(--accent) 4%, transparent);
  }
  .st-panel {
    border: 1px solid var(--line-soft);
    border-radius: var(--radius-panel, 6px);
    padding: 16px;
    background: var(--panel);
  }
  .st-panel--flush { padding: 0; overflow: hidden; }
  .st-panel-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid var(--line-soft);
  }
  .st-panel-title { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); }

  .st-grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
  @media (max-width: 640px) { .st-grid { grid-template-columns: 1fr; } }

  .st-card {
    border: 1px solid var(--line-soft);
    border-radius: var(--radius-panel, 6px);
    overflow: hidden;
    background: var(--panel);
    transition: background 160ms ease-out, border-color 160ms ease-out;
  }
  .st-card:hover { background: color-mix(in srgb, var(--accent) 3%, transparent); border-color: var(--line); }

  .st-split { display: grid; grid-template-columns: 300px 1fr; gap: 20px; align-items: start; }
  @media (max-width: 900px) { .st-split { grid-template-columns: 1fr; } }

  .st-rail-row {
    padding: 10px 14px; cursor: pointer; position: relative;
    border-left: 2px solid transparent;
    transition: background 140ms ease-out, border-color 140ms ease-out;
  }
  .st-rail-row:hover { background: color-mix(in srgb, var(--text) 3%, transparent); }
  .st-rail-row.is-active { border-left-color: var(--accent); background: color-mix(in srgb, var(--accent) 6%, transparent); }

  /* ============================================================
     MEMORY — "Calm Instrument"
     Shared toolbar/panel/card/grid vocabulary for Memory, RAG Docs,
     Notebooks and Dream Cycle. No per-card glow/tilt/shadow-stack —
     high-salience memories get a quiet accent border, not a bloom.
     ============================================================ */
  .mem-toolbar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 12px 16px; margin-bottom: 16px;
    border: 1px solid var(--line-soft); border-radius: var(--radius-panel, 6px);
  }
  .mem-panel {
    border: 1px solid var(--line-soft);
    border-radius: var(--radius-panel, 6px);
    padding: 14px;
    background: var(--panel);
  }
  .mem-rail {
    border: 1px solid var(--line-soft);
    border-radius: var(--radius-panel, 6px);
    padding: 12px;
  }
  .mem-type-row {
    padding: 7px 10px; border-radius: 4px; cursor: pointer; margin-bottom: 2px;
    border-left: 2px solid transparent;
    transition: background 140ms ease-out, border-color 140ms ease-out;
  }
  .mem-type-row:hover { background: color-mix(in srgb, var(--text) 3%, transparent); }
  .mem-type-row.is-active { border-left-color: var(--accent); background: color-mix(in srgb, var(--accent) 7%, transparent); }

  .mem-grid { display: grid; gap: 10px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
  @media (max-width: 640px) { .mem-grid { grid-template-columns: 1fr; } }

  .mem-card {
    border: 1px solid var(--line-soft);
    border-radius: var(--radius-panel, 6px);
    padding: 12px;
    background: var(--panel);
    cursor: pointer;
    transition: background 160ms ease-out, border-color 160ms ease-out;
  }
  .mem-card:hover { background: color-mix(in srgb, var(--accent) 3%, transparent); border-color: var(--line); }
  .mem-card.is-active { border-color: color-mix(in srgb, var(--accent) 55%, var(--line-soft)); }
  .mem-card.is-high-salience { border-left: 2px solid var(--accent); }

  /* ============================================================
     NOTES — "Calm Instrument"
     Reuses .st-split (300px rail + 1fr pane) and the .mem-card
     vocabulary for the note list. No per-card glow/tilt/shadow-ring
     — active note gets a quiet accent border, pinned gets a left
     accent-2 rail. Detail pane is a flush panel, icon-only actions.
     ============================================================ */
  /* Bug fix: .nt-split previously had NO rule at all — list/viewer stacked
     as plain blocks at every width, forcing a scroll past the whole list
     to reach the viewer. Give it the real 300px + 1fr split. */
  .nt-split { display: grid; grid-template-columns: 300px 1fr; gap: 20px; align-items: start; }
  .nt-list { display: grid; gap: 8px; grid-template-columns: minmax(0, 1fr); align-content: start; }
  /* Below the collapse breakpoint, only one pane shows at a time — a
     toggle switches between them instead of forcing a long scroll. */
  @media (max-width: 900px) {
    .nt-split { grid-template-columns: 1fr; }
    .nt-mobile-tabs { display: flex !important; }
    .nt-mobile-hide { display: none !important; }
  }
  .nt-mobile-tabs { display: none; gap: 6px; margin-bottom: 12px; }
  .nt-mobile-tabs button { flex: 1; }
  .nt-card {
    border: 1px solid var(--line-soft);
    border-radius: var(--radius-panel, 6px);
    padding: 12px; cursor: pointer; position: relative;
    background: var(--panel);
    transition: background 160ms ease-out, border-color 160ms ease-out;
  }
  .nt-card:hover { background: color-mix(in srgb, var(--accent) 3%, transparent); border-color: var(--line); }
  .nt-card.is-active { border-color: color-mix(in srgb, var(--accent) 55%, var(--line-soft)); background: color-mix(in srgb, var(--accent) 5%, transparent); }
  .nt-card.is-pinned { border-left: 2px solid var(--accent-2); }
  .nt-card.is-archived { opacity: 0.55; }
  .nt-toolbar-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--line-soft);
    background: transparent; color: var(--icon-default, var(--text-soft)); cursor: pointer;
    transition: background 140ms ease-out, border-color 140ms ease-out, color 140ms ease-out;
  }
  .nt-toolbar-btn:hover { background: color-mix(in srgb, var(--text) 5%, transparent); color: var(--text); border-color: var(--line); }
  .nt-toolbar-btn.is-danger:hover { color: var(--danger); border-color: color-mix(in srgb, var(--danger) 45%, var(--line-soft)); }
  .nt-toolbar-btn.is-active { color: var(--accent-2); border-color: color-mix(in srgb, var(--accent-2) 45%, var(--line-soft)); }

  /* ============================================================
     CONNECT — "Calm Instrument"
     Shared toolbar/card/panel/row vocabulary for Providers · MCP ·
     Skills · Channels · Composio · Machines. No per-card glow/tilt —
     matches Agents/Mission Control/Studio/Memory language.
     ============================================================ */
  .cn-toolbar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 12px 16px; margin-bottom: 16px;
    border: 1px solid var(--line-soft); border-radius: var(--radius-panel, 6px);
  }
  .cn-grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); margin-bottom: 16px; }
  .cn-card {
    border: 1px solid var(--line-soft);
    border-radius: var(--radius-panel, 6px);
    padding: 14px;
    background: var(--panel);
    transition: background 160ms ease-out, border-color 160ms ease-out;
  }
  .cn-card:hover { background: color-mix(in srgb, var(--accent) 3%, transparent); border-color: var(--line); }
  .cn-panel {
    border: 1px solid var(--line-soft);
    border-radius: var(--radius-panel, 6px);
    padding: 16px;
    background: var(--panel);
  }
  .cn-panel--flush { padding: 0; overflow: hidden; }
  .cn-row {
    border: 1px solid var(--line-soft);
    border-radius: var(--radius-panel, 6px);
    padding: 14px;
    margin-bottom: 10px;
    background: var(--panel);
    transition: background 160ms ease-out, border-color 160ms ease-out;
  }
  .cn-row:hover { background: color-mix(in srgb, var(--accent) 2%, transparent); }
  .cn-row.is-disabled { opacity: 0.55; }

  /* ============================================================
     SECURITY — "Calm Instrument"
     Shared panel/card/row vocabulary for Sentinel · Approvals ·
     Secrets. No per-card glow/tilt — matches Agents/Mission Control/
     Studio/Memory/Connect language.
     ============================================================ */
  .sec-panel {
    border: 1px solid var(--line-soft);
    border-radius: var(--radius-panel, 6px);
    padding: 16px;
    background: var(--panel);
  }
  .sec-panel--flush { padding: 0; overflow: hidden; }
  .sec-card {
    border: 1px solid var(--line-soft);
    border-radius: var(--radius-panel, 6px);
    padding: 14px;
    background: var(--panel);
    transition: background 160ms ease-out, border-color 160ms ease-out;
  }
  .sec-card:hover { background: color-mix(in srgb, var(--accent) 3%, transparent); border-color: var(--line); }
  .sec-row {
    padding: 14px 16px;
    border-bottom: 1px dashed color-mix(in srgb, var(--accent) 8%, transparent);
    transition: background 160ms ease-out;
  }
  .sec-row:last-child { border-bottom: none; }
  .sec-row:hover { background: color-mix(in srgb, var(--accent) 2%, transparent); }
  .sec-scope-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--line-soft);
    background: var(--panel);
    display: flex; align-items: center; gap: 10px;
  }

  /* ============================================================
     OBSERVABILITY — "Calm Instrument"
     Shared panel/console/row vocabulary for Analytics · Usage ·
     Health · Artifacts · Logs · Compression. Logs' terminal loses
     its glow + scan-line (matches every other tab's console/table
     surfaces); provider/error rows lose their JS onMouseOver hacks
     and hardcoded rgba(0,0,0,...) backgrounds in favor of CSS hover
     + theme tokens.
     ============================================================ */
  .ob-console {
    border: 1px solid var(--line-soft);
    border-radius: var(--radius-panel, 6px);
    overflow: hidden;
    background: var(--panel);
  }
  .ob-console-head {
    padding: 10px 14px; border-bottom: 1px solid var(--line-soft);
    display: flex; align-items: center; justify-content: space-between;
  }
  .ob-console-body {
    background: color-mix(in srgb, var(--bg-0) 45%, transparent);
    padding: 10px 14px; max-height: 560px; overflow: auto;
  }
  .ob-row {
    padding: 10px 8px; cursor: pointer; border-radius: 2px;
    transition: background 140ms ease-out;
  }
  .ob-row:hover { background: color-mix(in srgb, var(--accent) 4%, transparent); }
  .ob-sub-row { background: color-mix(in srgb, var(--text) 3%, transparent); }
  .ob-active-row { background: color-mix(in srgb, var(--accent) 5%, transparent); border-left: 2px solid var(--accent); }
  .ob-preview-box {
    background: color-mix(in srgb, var(--bg-0) 30%, transparent);
    border: 1px solid var(--line-soft); border-radius: 2px;
  }

  /* ============================================================
     SETTINGS — Calm Instrument pass
     ============================================================ */
  .se-panel {
    border: 1px solid var(--line-soft);
    border-radius: var(--radius-panel, 6px);
    padding: 18px;
    background: var(--panel);
  }
  .se-well {
    background: color-mix(in srgb, var(--bg-0) 45%, transparent);
    border-radius: 2px;
  }
  .se-banner-danger {
    background: color-mix(in srgb, var(--danger) 10%, transparent);
    border: 1px solid color-mix(in srgb, var(--danger) 30%, transparent);
    border-radius: 4px;
  }

  /* Stat card mobile scaling */
  .stat-card {
    padding: 14px;
  }
  .stat-value {
    font-size: 28px;
  }
  @media (max-width: 640px) {
    .stat-card {
      padding: 10px !important;
    }
    .stat-value {
      font-size: 20px !important;
      margin-top: 4px !important;
    }
  }
  @media (max-width: 375px) {
    .stat-card {
      padding: 8px !important;
    }
    .stat-value {
      font-size: 18px !important;
    }
  }

  /* Collapsible panel for mobile */
  .collapsible-panel {
    transition: max-height 0.3s ease, opacity 0.3s ease;
    overflow: hidden;
  }
  .collapsible-panel.collapsed {
    max-height: 0;
    opacity: 0;
  }

  /* Typography scaling for mobile */
  @media (max-width: 640px) {
    .nc-prose h1 { font-size: 22px; }
    .nc-prose h2 { font-size: 16px; }
    .nc-prose { font-size: 13px; }
  }

  /* ============================================================
     AGGRESSIVE MOBILE SCALING
     Scale down everything for small phone screens
     ============================================================ */
  
  @media (max-width: 640px) {
    /* Base font size reduction */
    html {
      font-size: 14px;
    }
    
    /* App layout with safe area for notch */
    .app {
      grid-template-rows: calc(48px + env(safe-area-inset-top, 0px)) 1fr 0 !important;
    }
    
    /* Panels and cards */
    .nc-panel {
      padding: 8px !important;
      border-radius: 3px;
    }
    .nc-panel.glow {
      box-shadow: none; /* Remove glow for performance */
    }
    
    /* Buttons - smaller but still tappable */
    .nc-btn {
      padding: 6px 10px !important;
      font-size: 10px !important;
      min-height: 36px !important;
      gap: 4px !important;
    }
    
    /* Inputs — 16px prevents iOS auto-zoom on focus */
    .nc-input, .nc-select, .nc-textarea {
      padding: 8px 10px !important;
      font-size: 16px !important;
      min-height: 38px !important;
    }
    
    /* Tags and chips */
    .tag, .chip {
      padding: 2px 5px !important;
      font-size: 8px !important;
      gap: 3px !important;
    }
    
    /* Status dots */
    .dot {
      width: 6px !important;
      height: 6px !important;
    }
    
    /* Labels */
    .label-tiny {
      font-size: 8px !important;
      letter-spacing: 0.12em !important;
    }
    
    /* Monospace text */
    .mono {
      font-size: 10px !important;
    }
    
    /* Page header */
    .page-header h1 {
      font-size: 18px !important;
      margin: 2px 0 4px !important;
    }
    .page-header {
      margin-bottom: 12px !important;
      gap: 8px !important;
    }
    .page-header-actions {
      gap: 4px !important;
    }
    
    /* Stat cards */
    .stat-grid {
      gap: 8px !important;
    }
    
    /* Main content area */
    .app .main {
      padding: 8px !important;
      padding-bottom: calc(60px + env(safe-area-inset-bottom, 0px)) !important;
      padding-left: max(8px, env(safe-area-inset-left, 0px)) !important;
      padding-right: max(8px, env(safe-area-inset-right, 0px)) !important;
      width: 100% !important;
      max-width: 100% !important;
    }
    
    /* TopBar - safe area aware */
    .app .topbar {
      height: calc(48px + env(safe-area-inset-top, 0px)) !important;
      padding-top: env(safe-area-inset-top, 0px) !important;
      padding-bottom: 0 !important;
      padding-left: calc(48px + env(safe-area-inset-left, 0px)) !important;
      padding-right: max(8px, env(safe-area-inset-right, 0px)) !important;
      width: 100% !important;
    }
    
    /* Mobile menu button - below the notch */
    #mobile-menu-btn {
      top: calc(6px + env(safe-area-inset-top, 0px)) !important;
      left: calc(6px + env(safe-area-inset-left, 0px)) !important;
    }
    
    /* Ensure full width on all child elements */
    .app .main > div {
      width: 100% !important;
      max-width: 100% !important;
    }
    
    /* Orb - scale down significantly */
    .orb {
      width: 120px !important;
      height: 120px !important;
    }
    .orb-container {
      min-height: 140px !important;
    }
    
    /* Overview grid */
    .overview-3col {
      gap: 8px !important;
    }
    
    /* Kanban */
    .kanban-grid > * {
      flex: 0 0 75vw !important;
      min-width: 260px !important;
    }
    
    /* Section titles inside panels */
    .nc-panel .label-tiny {
      margin-bottom: 6px !important;
    }
    
    /* StatCard content */
    [class*="StatCard"], .nc-panel.glow.tilt {
      padding: 10px !important;
    }
    [class*="StatCard"] > div > div:nth-child(2),
    .nc-panel.glow.tilt > div > div:nth-child(2) {
      font-size: 20px !important;
      margin-top: 4px !important;
    }
    
    /* Hide decorative elements */
    .scan-line,
    .stripe-bg {
      display: none !important;
    }
    
    /* Reduce gaps everywhere */
    [style*="gap: 12px"] { gap: 8px !important; }
    [style*="gap: 14px"] { gap: 8px !important; }
    [style*="gap: 16px"] { gap: 10px !important; }
    
    /* Reduce margins */
    [style*="marginBottom: 16"] { margin-bottom: 10px !important; }
    [style*="marginBottom: 14"] { margin-bottom: 8px !important; }
    [style*="margin-bottom: 16px"] { margin-bottom: 10px !important; }
    [style*="margin-bottom: 14px"] { margin-bottom: 8px !important; }
  }
  
  /* Extra small phones (iPhone SE, etc.) */
  @media (max-width: 375px) {
    html {
      font-size: 12px;
    }
    
    .nc-btn {
      padding: 5px 8px !important;
      font-size: 9px !important;
      min-height: 32px !important;
    }
    
    .page-header h1 {
      font-size: 16px !important;
    }
    
    .orb {
      width: 100px !important;
      height: 100px !important;
    }
    .orb-container {
      min-height: 120px !important;
    }
    
    .app .topbar {
      height: calc(44px + env(safe-area-inset-top, 0px)) !important;
    }
    .app {
      grid-template-rows: calc(44px + env(safe-area-inset-top, 0px)) 1fr 0 !important;
    }

    #mobile-menu-btn {
      width: 32px !important;
      height: 32px !important;
      top: calc(6px + env(safe-area-inset-top, 0px)) !important;
      left: calc(6px + env(safe-area-inset-left, 0px)) !important;
      font-size: 14px !important;
    }

    .mobile-bottom-nav {
      height: calc(48px + env(safe-area-inset-bottom, 0px)) !important;
    }
    .mobile-bottom-nav a {
      font-size: 8px !important;
      padding: 4px 8px !important;
    }
    .mobile-bottom-nav a svg {
      width: 18px !important;
      height: 18px !important;
    }
  }

  /* Padding utilities for mobile */
  .p-mobile { padding: 16px; }
  @media (max-width: 640px) {
    .p-mobile { padding: 12px; }
  }

  /* Gap utilities */
  .gap-responsive { gap: 16px; }
  @media (max-width: 640px) {
    .gap-responsive { gap: 10px; }
  }

  /* Native <select> popups default to a white OS/browser popup; without this,
     any select using light inherited text color renders near-invisible text
     on a white dropdown list. Forces the browser to draw the popup itself
     (background + text) using its dark UI theme. Global safety net so this
     class of bug can't recur on any page. */
  select { color-scheme: dark; }

  /* Global button text-color reset: browsers give unstyled <button> elements
     a default "buttontext" color (near-black), independent of the page's
     dark theme. Any button that doesn't set an explicit color (e.g. Backlot's
     project-rail rows) silently renders near-invisible dark-on-dark text.
     Safety net so this class of bug can't recur on any page. */
  button { color: inherit; }

</style>
